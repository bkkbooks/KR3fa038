body:
  text: 宿星名兩星直下稱為𨐧雲雨之旁名霹靂土公天厩兩依稀鉄鐲深深難出入主國書文薄之府𨐧宿明王道行君子進暗而失色王者好武經士不用雲雨明則多水霹靂明則起兵土工動搖明芒角土木工火與天厩明馬肥暗馬不見牛馬多死鐵鐲明則郵駟煩兵事與府庫不謹
