body:
  text: 箕宿星名箕星四點類筲箕災兆分明應后妃箕下三星名木杵箕前一點是粳秕主后妃口舌胡兵亦曰天津箕宿就裹微細后災天下憂動胡兵起有使來移徙百姓流亡明直大則五轂熟收入河中國災人將相食甚角王爭鬪大臣相諧水杵直年豐橫年歉不見人相食粳秕明則年豐暗則年歉不見天下米盡
