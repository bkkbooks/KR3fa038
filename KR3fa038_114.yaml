body:
  text: 箕宿星名箕星四點類筲箕灾兆分明應后妃箕下三星名木杵箕前一点是糠秕主后妃口舌胡兵亦曰天津箕宿就裹微細后灾天下憂動胡兵起有使来移徙百姓流亡明直大則五轂熟收入河中國灾人將相食甚角王爭闘大臣相諧水杵直年豊橫年歉不見人相食糠秕明則年豊暗則年歉不見天下米盡
