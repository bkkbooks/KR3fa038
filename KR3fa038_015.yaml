body:
  text: 角宿兩星南北正直著中有平道上天田總是黑星兩相連别有一烏名進賢平道右畔獨淵然最上三星周鼎形角下天門左平星雙雙橫于樓庫上樓庫十星屈曲明樓中五柱十五星三三相似如鼎形其中四星别名衡南門樓外兩星橫亢宿四星恰似彎弓狀大角一星直上明折威七子亢下橫大角左右挕提星三三相似如鼎形折威下左頓頑星兩個斜安黃色精頑下二星號陽門色若頓頑直下存氐宿四星似斗側量米天乳氐上點一星世人不識稱無名一個招搖梗荷上梗荷橫列三星狀帝星三點河之西亢池六星近挕提氐下衆星騎官出騎官之衆二十七三三相連十欠一陳車之下騎官次騎官下三車騎位天輻兩星立陳旁將軍陳裡鎮威霜房宿四星直下主明堂鍵閉一黃斜向上鈎鈴兩個近其旁罰有三星直鍵上兩咸夾罰似房狀房西一星號為日從官兩星日下出心宿三星中央色最深下頭積卒共十二三三相聚心下是
  hash: sha256:63c866c4973078cd7382dfe9b3df88fe2f99acc78f51d48a1f86857784b4b242
