body:
  text: 嘗觀維世之道不越乎天文地理兵法醫藥禮樂等書而吾人用世之學亦不外乎敬天勤民測地練兵濟生等術惜乎至道無傳至人鮮見是以禮樂教化不行于世或有不虞則君臣無盱措手足而土宇為之侵奪者比矣若此寧非失偹于平時而樂于安常者然也苟能運籌于夙昔決勝于未戰雖千萬人吾敢當矣又何患夫虞之不可偹而土宇之不可守乎幸而天意有在使吾青田東陵陳夫子得續郁離子不傳之祕夷以甲午秋來教吾邑盡其道以私淑于鳳余思既得奇書之全當有以會其義乃誣病數月未出因得以少探其旨至于抵悟不能知者每夜請于夫子之前必求之乃已厥後夫子去邑行且囑曰世變之識危于旦夕子盍預為以俟變余牾師言遂徙京師因售知于大丞兩湖葉公大司馬角川張公拜前聀似固榮矣而復稽諸天象揆諸物理乃知事有不可言者于丁未春歸隱于今虔潛心玩索逮越八年時覺胸中大有不同于昔日者自謂有以紹前哲慰民望為不知百司者鑑矣孰意彼蒼不眷無何疾作俾吾志而遽止
  hash: sha256:beabda42706cffc95d878c394d693153ac95393a3ce0f9e7a72a9f5516fc14be
