body:
  text: 嘗觀維世之道不越乎天文地理兵法醫藥禮樂等書而吾人用世之學亦不外乎敬天勤民測地練兵濟生等術惜乎至道無傳至人鮮見是以禮樂教化不行扵世或有不虞則君臣無盱措手足而土宇為之侵奪者比矣若此寧非失偹于平時而樂扵安常者然也苟能運筹扵夙昔决勝扵未戰雖千萬人吾敢當矣又何患夫虞之不可偹而土宇之不可守乎幸而天意有在使吾青田東陵陳夫子得續郁離子不傳之秘夷以甲午秋来教吾邑盡其道以私淑扵鳳余思既得奇書之全當有以會其義乃诬病数月未出因得以少探其旨至扵牴悟不能知者每夜请扵夫子之前必求之乃已厥後夫子去邑行且嘱曰世變之識危扵旦夕子盍預為以俟变余牾師言遂徙京師因售知于大丞兩湖葉公大司馬角川張公拜前聀似固荣矣而復稽諸天象揆诸物理乃知事有不可言者扵丁未春歸隐于今虔潜心玩索迨越八年時覺胸中大有不同扵昔日者自謂有以紹前哲慰民望為不知百司者鑑矣孰意彼蒼不眷無何疾作俾吾志而遽止
