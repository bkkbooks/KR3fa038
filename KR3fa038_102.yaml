body:
  text: 房宿星名房星直下帶鈎鈴徤罰依稀夾兩咸旁有一星名歸日從官日下耀星纏日月五星之道曰四輔曰天駟又主明堂之所房宿明大羣臣和平暗小羣臣乱政王道虧損盛大芒角兵起星離入流離中二星踈折減有星主動河流星妄用兵不利鈎鈴明小近房天下共心遠於房天下不和王者絕後
