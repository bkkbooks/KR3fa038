body:
  text: 庫樓兵起作亂財貨虛耗攝提聖人受制大風不常損壞百物房宿將相災危馬多死心宿君上憂危皇子災凶旱災招搖國有凶喪兵水為災胡兵大敗陽門邊兵作亂詐死入內尾宿歲飢后與妃嬪俱災斗宿兵起臣子弒君父久守國君絶嗣大臣災箕宿歲凶米貴后宮譜毀天江天淵魚鱉龜星大水白衣會兵起狗國中國人通夷作亂牛宿吳越有自王者牛多疫津梁有阻天辨君改服制囚徒亂起建星百物損傷徭役重大女宿賤妾凌貴女人作亂二派谷果不成魚藍貴虛宿國有凶喪兵起臣災危宿土工妄與祭祀不敬室宿改作宮殿兵災可利墳墓天下人民死亡過半
