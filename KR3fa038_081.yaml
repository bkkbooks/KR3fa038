body:
  text: 雨垣均明吉盛大芒角動搖內輔大盛分開兵起太于明潤太子仁賢暗則昏弱芒角搖動陰謀篡奪三公明小輔相淂人芒角强臣專權不見則無賢九鄉明大芒角天下訟煩暗則鋼紀不掁不見則國政壞散亂諸侯明則諸侯忠良暗則諸侯受殃動搖蕃臣受命以千王者謁者不見外國不朝少微明潤貴士用幸臣明大幸官淂志靈台明則驗曆有準從官不見則君不安芒角侍臣作亂長垣芒角搖動胡兵入寇即位明大大臣作亂不見幸臣誅明堂明大王政和平暗小凶常陳明則武備固暗則武備弱不見兵起動搖天子自將出兵虎蕡明大芒角動搖近侍謀叛即將明大動搖將驕不可遏
