body:
  text: 頁四八十月月蝕陰太獨傷將軍災危人多寃獄月暈蝕掩犯衆星暈蝕犯北斗水災國喪兵起有赦天乙百谷不成歲凶人飢紫微天子鴻昏廢后立寵太微女后擅權谷耗牲傷天市姦邪陰謀谷耗將相凶貫索刑罰不平人多寃獄帝座陰謀干上國主災危左角刑濫罰貪右角兵亂起亢宿近侍陰謀變及內朝民疫將軍災死氐宿前后妃災氐宿後主將兵凶房宿上水災相凶房下星旱災將凶月入房中為陰為雨不雨將相災月出房中地震歲旱谷傷人飢蝕暈犯心中君災心前太子凶心後庶子凶尾前妃后災凶尾後妃嬪災凶箕宿后妃背怨百谷不登斗宿君后不和災及大臣建星蛟龍時現谷傷畜損牛宿津梁阻塞牛馬多死女宿賤妾凌貴女人多死虛宿國喪臣災祭祀不潔墓墳宮殿崩毀臣敗人死危宿土工兵災祭祀不享室宿土木妄興歲飢兵亂璧宿姦邪得志文臣多難羽林軍兵戈亂起將相災憂奎宿兵戈亂起武庫不謹婁宿刑濫兵起郊祀不享胃宿倉廩虛耗謀殺妄及昴宿刑罰不當胡兵為寇
