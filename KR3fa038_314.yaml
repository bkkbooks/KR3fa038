body:
  text: 再續載晉李后續傳物志載天圓圈三百六十五度四分度之一案考霻曜云一度二千九百三十二里千四百六十一分里之三百四十八周天百七萬一千里者是天圓周之里数也以圍三径一之則直徑三十五萬七千里此為二十八宿周圍直徑之数也然二十八宿之外上下東西各有萬五千里是為四遊之独謂之四表四表之內并星宿內縂有三十八萬七千里然則天之中央上下正半之豦則一十九萬三千五百里地在於中是地去天之数也廣雅云天去地二億一萬六千七百八十一里半度地之厚與天高等南北相去二億三萬三千五十七里二十五步東西短四十步石氏經北斗七星其次舎自張而至於角一日天福主秦二日璇主楚三日璣主梁四日權主吳五日王衡主趙六日開陽主燕七日搖光齊
  hash: sha256:6bab153273149c458100185755e0b622109536bca0b341a126d37a1ece1e30cd
