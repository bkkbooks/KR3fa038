body:
  text: 再續載晉李后續傳物志載天圓圈三百六十五度四分度之一案考霻曜云一度二千九百三十二里千四百六十一分里之三百四十八周天百七萬一千里者是天圓周之里數也以圍三徑一之則直徑三十五萬七千里此為二十八宿周圍直徑之數也然二十八宿之外上下東西各有萬五千里是為四遊之獨謂之四表四表之內并星宿內總有三十八萬七千里然則天之中央上下正半之豦則一十九萬三千五百里地在於中是地去天之數也廣雅云天去地二億一萬六千七百八十一里半度地之厚與天高等南北相去二億三萬三千五十七里二十五步東西短四十步石氏經北斗七星其次舍自張而至於角一日天福主秦二日璇主楚三日璣主梁四日權主吳五日王衡主趙六日開陽主燕七日搖光齊
  hash: sha256:eb02d8a7dcbd270a8d1d028ace61fad1a2764374b913831ec18890a4330b08d9
