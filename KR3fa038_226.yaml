body:
  text: 入亢邊兵起金守天市垣兵起人灾建星萬物不成天狗鶉外夷兵起天田水灾人飢虛宿國政急臣謀君兵起血流金犯女宿布帛貴守女宿布帛貴兵起婦女多死天壘城夷人犯邊盜賊侵害危宿主兵革金犯守虛梁兵起守離宫兵革散久守兵火起天錢賊兵虜掠羽林軍兵亂為灾𨐧宿王急刑罰奎宿大水洪流久守兵起婁宿白衣會兵起赦天下月戴金星主急兵守兩更兵起山澤之間胃宿君王有倉卒之變
