body:
  text: 子日雷讒侫與盜賊起水災主兵喪丑日雷天子出遊將相遷移土木兵革與寅日雷胡兵動人災妖言起津梁不通卯日雷太子庶子災后宮災辰日雷兵亂天子不安國失土地已日雷蠻夷兵亂吳分飢凶分野也午日雷奢侈淫酣遊樂無度火災時作未日雷大水兵役人死如山庫藏火災歲凶申日雷兵戈憂害亂動將相災凶酉日雷外夷使入國靣戎燕趙兵亂邊鄙不寧戍日雷王者遷宮土木大興火災亥日雷水災暴寒兵戈飢饉雨占天低氣昏遊氣蔽天日月失色雲氣四合星宿光昏畨白頭髮潤石礎濕蟻出穴鵲洗浴月暈月入箕入畢入軫燈熖秃日應鳥雲如山鳥豬渡河散入河內白雲橫于日月北斗下雲飛揚不斷大風吹雲東方而起黑霧相接皆雨之兆常雨君顏不密陰謀干上無雲而雨君敬不肅國有兵災
