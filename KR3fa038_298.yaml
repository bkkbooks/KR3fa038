body:
  text: 子日雷讒侫與盜賊起水灾主兵喪丑日雷天子出遊將相遷移土木兵革與寅日雷胡兵動人灾妖言起津梁不通卯日雷太子庻子灾后宮灾辰日雷兵乱天子不安國失土地已日雷蛮夷兵乱吴分飢㓙分野也午日雷奢侈淫酣遊樂無度火灾時作未日雷大水兵役人死如山庫藏火灾歲㓙申日雷兵戈憂害乱動將相灾㓙酉日雷外夷使入國靣戎燕趙兵乱邊鄙不寧戍日雷王者遷宮土木大興火灾亥日雷水灾暴寒兵戈飢饉雨占天低氣昏游氣蔽天日月失色雲氣四合星宿光昏畨白頭髮潤石礎濕蟻出穴鵲洗浴月暈月入箕入畢入軫燈熖秃日應鳥雲如山鳥豬渡河散入河內白雲橫于日月北斗下雲飛揚不断大風吹雲東方而起黑霧相接皆雨之兆常雨君顏不宻陰謀干上無雲而雨君敬不肅國有兵灾
