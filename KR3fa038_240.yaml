body:
  text: 火星名熒惑二年一周年十月入太微垣受命而出絶于室壁行一舍二舍為不祥東行疾兵聚於東兩行疾兵聚於西其性主禮主視禮廢視失罰見火星春夏光明秋冬色淡常有時雨禮法正明行政當罪不時出兵起而不時入兵散光明散大天助其威色紫縮小天敗其神火星色赤為旱灾火灾吳越楚分灾甚在南人君喪南方灾在北女后喪北方旱色白水灾兵起色變不常主危亂之咎乍連乍退乍前乍後乍左乍右兵灾愈甚芒角逆行主水兵喪芒彗所損其方可被分野上逆行勾已狀下圍兵芒角如烽火兵言人人犯太微垣賊臣謀逆南方大旱光盛動搖兵起作亂犯月襲月女后灾宰相戮賊起人元當出不出當入不入謀臣逆命天色赤光天助其神火旱灾與色淡縮小天奪其魄人民失業
