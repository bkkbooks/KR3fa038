body:
  text: 霞如炫錦國命賢相須赦救民霞明五采下有孝子霞聚不散君德不宻奸邪欺蔽霞結如輪下有忠良紫霞貫日國主賢嗣或任賢臣霞結虎班下有大將白霞貫月后妃將相皆主灾悔寸叚光熖下有賢才人黑霞貫日主風雨不雨君灾㓙白霞勁射現雷兵乱霞色慘白國主兵喪霞炫即散賊起尋滅霞如虎賊兵起乱霞邊氣謹防暗害霞如任敏飢饉赤霞無彩火灾殃民赤霞白霞貫日下君喜淂賢臣相輔黑霞貫月民臣灾主雨黑霞在日上下左右民灾黑氣慘黃主雨
