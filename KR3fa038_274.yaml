body:
  text: 星變星殞星落墜下兵乱起荒旱人飢國君喪死星昇自下而上君上灾憂矢星橫飛而去奸邪謀逆同舎兩星共處兵灾益盛奔星大而去連灾害甚速星闘兩星相編兵起血戰星凌自下而上君危民灾星犯相去七寸以穜奸邪謀逆星守半年以上其禍極大星襲後行相及過而復回陰謀暗害星留守百日以上大禍難平勾西南相統剪除羽翊已東坑相勾成已已数奸邪謀叛琛遠周五了難其褐延綿玉甫書天文秘㫖卷之四终此本共记卄七篇
