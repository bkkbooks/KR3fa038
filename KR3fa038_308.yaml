body:
  text: 霜附木如雪姦邪妄殺夏霜傷物行政不可師出霜滿旱兵不可妄動春霜象白紀綱不密刑濫兵起霜在草不在枝上玫急殺人刑及無辜露占地氣上升為潤成物非天降露也天作旱災地脈焦枯無露甘露著於草本或黃白或淡紅如珠大而珠甘見日不消歲大收國生賢嗣民安天時無雨有露滋物歲收人安君德淫昏賢臣輔政雨水均停露不生潤君政苛刻好生無德露如脂飴沾木上恩德失當失于濫賞兵叛生災雪占雪乃陰寒結聚其雨而成順時盈尺為吉非時仞犬為災畫日夜月緑鵲羣飛豬腳草天彤雲人足冷為雪兆正二九月雪陰歲凶民災政蔽形慘國主失土三四月雪陰凌陽也朝綱不振君政刻剝大雪芒寒涷死人物行政濫雪賊兵起亂寒雪連旬凍傷人物人君偏言刑濫兵起
  hash: sha256:49d50e0dc38c9cafc958179532f7f047177f9f37f85a2536722fa54167e11307
