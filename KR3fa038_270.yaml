body:
  text: 燭星星如太白上有芒彗其出不行不火而滅出則城邑有大盜不成妖星占妖星乃其不良之星偶見天以兆禍亂形長久守其灾大期遠而形短尋滅其灾小禍期近東南有三大星名曰人盤天下盜賊兵起西南有三大星名曰促織布帛貴國有凶喪東北有三大星名曰凌德君憂危米貴人飢西北有三大星名曰天問歲凶人死賊臣起兵天狗星赤星上鋭下托赤星出如彗涿星墜下如犬青赤雲福戚大見則兵起破賊殺將人將相食君失土地蚩尤星赤星上鋭末托赤星光星形變旗旗赤星黃星赤雲結聚下托三尾皆主兵起擾亂天下天搶星出東方尾上沖長三玉文破國敗軍飢暴死五殘星出東方去六文黃星表青如暈生毛兵大起無兵主凶喪六賊星出南方如彗九去地云文赤西數兵大起國有盜司危星出西方去地六文大白西有毛雨角失法豪傑起天子不義亂蓬星出西南星大如斗色青然所見之國風雨不莭五谷不登色白國亂飢大陰謀死咸漢星出北方去地六文青中赤表下有三勞縱橫灾起兵亂大喪天𦂯星出西北方如彗如長四玉文末四如鈎見則國亂寇起臣下相代內外大亂丘甸星出北斗旁旁如維筆怒而青黑臣下謀逆兵亂
