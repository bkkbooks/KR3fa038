body:
  text: 夜露日光陰氣不密陰謀侵上終難成事日色青碧陰氣重盛東夷亂臣下叛吳人散夏日如冬陽氣衰弱夷狄作亂寇盜兵起冬日如下陰氣衰微蠻夷人寇姦謀生變白虹貫日陰陽不和兵災大興國主憂危黑虹貫日陰犯陽也后妃擅權陰謀弒逆清氣繞日陽道不滿寇賊兵起圍于城下數日相掩天下大亂瘵主分地日夜出光主生弒奪日盡其光天子絶無日慘生鬚陽氣泄也天將有雨文武相依白霞貫日暗生謀弒日色昏黑上刑慘暴國有憂災野有水災日隕于地姦臣女后私帝之權四月日變紅陽亢陰也君上暴虐后宮不寧四月日變黑陰盛其陽姦邪權政陰謀作亂十月日變黑陽不勝陰君昏信讒陰謀叛逆日色白西風成旋陰陽氣亂息主陰謀起兵作亂日昏失色行人無影國政不明將軍災黑物在日中有如飛燕天子廢出日當出不出當入不入君王失道濫邢喪國日生黑異或黑靨黑子黑暈或變王字或變形或變人象人頭或變禽獸形人啓昏昧臣挾私愛進黨不肖險實忠良傷損國體小則專權大則篡弒日冠赤青蓋于日上君王喜慶得天眷祐日負青赤起于日上軍吉國昌外主得地日提赤青三角擊日上君愛臣制不能自行日珥青黃炫爍日旁平時主風雨不兩國有亂日璚五采炫耀日旁國有喜慶野有風雨日戟赤青倚戳日旁近侍謀逆刑及貴人日直雜氣如川字倚日亂名主啓分析國土
