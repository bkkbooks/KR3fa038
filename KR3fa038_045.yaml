body:
  text: 夜露日光陰氣不密陰謀侵上終難成事日色青碧陰氣重盛東夷乱臣下叛吴人散夏日如冬陽氣衰弱夷狄作乱㓂盗兵起冬日如下陰氣衰微蠻夷人㓂奸謀生變白虹貫日陰陽不和兵灾大興國主憂危黑虹貫日陰犯陽也后妃擅權陰謀弒逆清氣遶日陽道不滿㓂賊兵起圍于城下数日相掩天下大乱瘵主分地日夜出光主生弒奪日盡其光天子絕無日惨生鬚陽氣泄也天将有雨文武相依白霞貫日暗生謀弒日色昏黑上刑惨暴國有憂灾野有水灾日隕于地奸臣女后私帝之權四月日變紅陽亢陰也君上暴虐后宮不寧四月日變黑陰盛其陽奸邪權政陰謀作乱十月日變黑陽不勝陰君昏信谗陰謀叛逆日色白西風成旋陰陽氣乱息主陰謀起兵作乱日昏失色行人無影國政不明将軍灾黑物在日中有如飛燕天子癈出日當出不出當入不入君王失道濫邢喪國日生黑異或黑靨黑子黑暈或變王字或变形或变人象人頭或变禽獸形人启昏昧臣挾私愛進黨不肖險實忠良傷損國体小則專權大則篡弒日冠赤青盖扵日上君王喜慶得天眷祐日負青赤起扵日上軍吉國昌外主得地日提赤青三角擊日上君愛臣制不能自行日珥青黄炫爍日旁平時主風雨不兩國有乱日璚五采炫耀日旁國有喜慶野有風雨日戟赤青倚戳日旁近侍謀逆刑及貴人日直雜氣如川字倚日乱名主启分析國土
