body:
  text: 華蓋正則吉邪則內侍謀叛傳舍外使來王暗四歲犯邊二樞明新君即位有政民搖動囊起宮掖天柱明則稱戰暗則司曆有失天倍不見兵起芒角兵大亂內階明吉傾動不見內府有變天厨明上膳得中暗厨膳不給失色芒角內膳進毒天床明吉傾動人君不安天床即天卦庶子心後星俱小明庶子安二星芒角庶子不安分二星暗小庶子微弱心復星者即心宿近尾之星也占與庶子同八轂一稻二黍三田四大小麥五六大小豆七粟八麻明八谷收星亡人餓莩一星不見一谷不收陰陽德明則陰陽和人君帳恤其民
