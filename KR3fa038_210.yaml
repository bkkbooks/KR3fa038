body:
  text: 星度角十三度元九度弱氐十六度房五度弱心六度弱尾十九度弱箕十度半斗二十五度弱牛七度半女十度弱虛九度弱危十五度半室十七度𨐧八度強奎十六度半婁十二度胃十五度昴十一度弱畢十七度弱觜半度參十度半井二十三度弱鬼二度半栁十三度強星六度強張十七度弱翼十八度強軫十七度凡星一度有二千九百二十三里七十二步二尺四寸四分角亢為壽星氐房心為大火尾箕為析木析音斯斗牛為星紀女虛危為玄枵枵音箕室壁為娵訾奎婁為降婁胃昴畢為大梁觜參為實沉井鬼為鶉首鶉首純栁星張為鶉火翼軫為鶉尾有二星管一方有三星官一方各以四時隨天運行也星中
