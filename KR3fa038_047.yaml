body:
  text: 日漏白虹貫滿日旁國有兵喪灾及君王日序赤青圍日上下奸邪欺蔽共為謀逆日格青赤横日上下國有賢臣扶持國政日抱青黄圍抱日旁國主喜慶主兵納祥日口諸氣生口日邊一二口奸邪害君四五口王侯謀立日蛇赤黄如蛇纏日兵戈乱起謀弒其君日葥黑氣如矢射日奸邪謀逆欲移國命日墜青赤如人頭垂下奸侫專權累害其君日象赤青挟日以飛奸侫脇君紊乱國敗日纓青赤懸遶日下兵主納祥四夷重繹日紐青氣散垂日下君有恩澤施及天下日背赤黄如月托日奸邪謀逆自負綱常日履白氣散扵日下兵喪為灾君王出走李淳風曰履為吉兆未知孰是愚意亦當詳察五色為斷也日足霞氣雙垂日下陰謀害君國主走出日承黄氣半暈日下賢臣輔佐政國日病日出三丈太赤無光日沒赤亦然主有風雨不雨边乱回危日暈日暈五色國有賢嗣相日重交暈天下豪傑有自立者日暈兩重轂傷歲㐫人将相食日暈青色蝗生谷傷人多瘻疫
