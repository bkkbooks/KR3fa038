body:
  text: 日漏白虹貫滿日旁國有兵喪災及君王日序赤青圍日上下姦邪欺蔽共為謀逆日格青赤橫日上下國有賢臣扶持國政日抱青黃圍抱日旁國主喜慶主兵納祥日口諸氣生口日邊一二口姦邪害君四五口王侯謀立日蛇赤黃如蛇纏日兵戈亂起謀弒其君日葥黑氣如矢射日姦邪謀逆欲移國命日墜青赤如人頭垂下姦侫專權纍害其君日象赤青挾日以飛姦侫脅君紊亂國敗日纓青赤懸繞日下兵主納祥四夷重繹日紐青氣散垂日下君有恩澤施及天下日背赤黃如月托日姦邪謀逆自負綱常日履白氣散于日下兵喪為災君王出走李淳風曰履為吉兆未知孰是愚意亦當詳察五色為斷也日足霞氣雙垂日下陰謀害君國主走出日承黃氣半暈日下賢臣輔佐政國日病日出三丈太赤無光日沒赤亦然主有風雨不雨邊亂回危日暈日暈五色國有賢嗣相日重交暈天下豪傑有自立者日暈兩重轂傷歲凶人將相食日暈青色蝗生谷傷人多瘻疫
