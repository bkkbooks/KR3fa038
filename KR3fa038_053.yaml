body:
  text: 月之行天若遇五星向之則行稍疾疾則行四十度少强若背五星則行緩緩則行十二度少强人謂一日行十三度有奇暨向言之也初一行十三度九分初二二十六度十四分初三四十度三分初四五十三度九分初五六十六度十六分初六八十度四分初七九十三度十分初八百六度八分初九百廿度六分初十百卅二度十三分十一百四十七度七分十二百六十度八分十三百七十三度十三分十四百八十七度三分十五二百度十分十六二百十三度七分十七二百廿七度五分十八二百四十度十二分十九二百五十四度二十二百六十七度七分二十一二百八十度十四分廿二三百九十四度一分廿三三百七度九分廿四三百廿度十六分廿五三百卅四度四分廿六三百四十七度十一分廿七三百六十度十八分廿八三百七十四度六分廿九復行廿二度八分卅半二十九度一分月占白虹貫日陰氣滯結女后大将無功大臣庸青黑臨月陰氣純結兵散将士國主大㐫
