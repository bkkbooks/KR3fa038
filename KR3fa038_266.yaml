body:
  text: 諸侯宗正宗枝不和氐元陰謀起于內朝梗河胡兵作乱日星君王作乱天輻輦道有变積萃冰輦乱起天问賊臣起兵盖屋大興土木敗回歲飢兵起天涃國祚不安王井主水羽林軍兵乱國危天錢財多耗散鉄鉞礪石兵乱臣誅王良津梁不通天倉天庾粮米不耗天廩天稷歲㓙人飢畢宿北胡兵起屏星人民大疫天厕屎星歲㓙人飢
