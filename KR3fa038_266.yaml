body:
  text: 諸侯宗正宗枝不和氐元陰謀起于內朝梗河胡兵作亂日星君王作亂天輻輦道有變積萃冰輦亂起天問賊臣起兵蓋屋大興土木敗回歲飢兵起天涃國祚不安王井主水羽林軍兵亂國危天錢財多耗散鐵鉞礪石兵亂臣誅王良津梁不通天倉天庾糧米不耗天廩天稷歲凶人飢畢宿北胡兵起屏星人民大疫天厠屎星歲凶人飢
