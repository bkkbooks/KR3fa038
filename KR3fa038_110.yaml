body:
  text: 尾宿星名尾星鈎樣夾神宮傳說天宮耀漢中魚子歸星掩映𠰥還聚就水洪通上一星為后後三星為妃後五星為嬪妾尾宿均明后宮有序多子息微小暗亡各主灾動搖君后不知天下亂就裘主水火灾大凶神宮解衣之內室明大芒角主內亂傳說明潤后宮子多暗小少子動搖后妃不安星亡天子絶嗣天江明大暴水至動搖主大水兵起不見津梁不通魚子明小風雨不莭動搖暴水至出漢中人多病絶龜星明潤名和不居河中川水至
