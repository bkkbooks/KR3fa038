body:
  text: 畢宿星名畢宿附耳上天捯天莭諸侯天潢九城天五車口三柱高旅九遊來日月五星之道主邊兵主刑殺主四夷畢宿明大四夷來𡩏失色邊兵動搖邊兵出一星亡兵散離散天下獄亂就法令酷附耳微小盜起邊兵動移入畢大亂三柱柱星出五車外來貴天街移徙不見兵起𨵿津不通九遊動搖九洲人散民皆失業
