body:
  text: 雲變紫赤滿天所現之方火災兵起日下蒼雲白色人多兵災國有憂喪三月三日日下赤雲夏秋必旱民多疫死雲磨作聲人民怨上黑雲沖月或沖北斗主雨無雨天子淫奢居喪不哀夏鳥雲接日主蓐暑多姦謀冬白雲近夕主大風大寒刑政濫雲拖日下如劍戰白色兵喪黑色憂水雲歸所起之方兵勝班師雲陳徘徊結聚陰謀害上雲陳兩邊射日賊寇害上雲陳忽兩分開陰謀為害雲起墓絶方不散陰謀不成四方黑雲如龍陰謀干上赤雲如煙火陰謀干上白雲如練帛陰謀干上雷占風雷者天之號令也風順其時拈者榮縈者實雷應其時屈者伸蟄者舒此天之令喜也風不順時震人傷物此天之令怒也雷叢之二月收之八月為應
