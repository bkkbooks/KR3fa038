body:
  text: 雲变紫赤滿天所現之方火灾兵起日下蒼雲白色人多兵灾國有憂喪三月三日日下赤雲夏秋必旱民多疫死雲磨作聲人民怨上黑雲沖月或沖北斗主雨無雨天子淫奢居喪不哀夏鳥雲接日主蓐暑多奸謀冬白雲近夕主大風大寒刑政濫雲拖日下如劍戰白色兵喪黑色憂水雲歸所起之方兵勝班師雲陣徘徊結聚陰謀害上雲陣兩邊射日賊寇害上雲陣忽兩分開陰謀為害雲起墓絕方不散陰謀不成四方黑雲如龍陰謀干上赤雲如烟火陰謀干上白雲如練帛陰謀干上雷占風雷者天之號令也風順其時拈者荣萦者實雷應其時屈者伸蟄者舒此天之令喜也風不順時震人傷物此天之令怒也雷叢之二月收之八月為應
