body:
  text: 栁宿星名栁宿𡸁曲最為奇頭上三星號酒旗失色定僚饑饉至五星守犯大為主草木主尚食滋味主風雨栁宿明大臣慎重國安寧厨膳具二星直天下謀伐其君聚就主兵間失色饑饉滿道都邑震蕩酒旗在軒轅左角主宴樂酒食明則多歡娛之事
