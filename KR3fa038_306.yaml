body:
  text: 畫霧如山兵水為灾夜霧畫明陰謀不成后灾臣難夜霧如城兵戎起亂風霾陰晦君臣離心陰謀叛逆黃霧四塞帝室將位叛臣革命黑霧不解寃枉之甚變為兵灾昏霧迷天君動失措陰謀暗害霧久不散陰謀變亂上下為灾霧迷有露如雨君德昏蔽有臣輔政正畫霧昏如夜行政濫及謀逆起兵霧如脂污衣物君比淫明胡兵為華霧半月不散陰陽秒亂天下憂灾風起塵揚生霧畫瞑夜暗兵灾霧起塵搏如兵起亂黃霧君德龍不蔽絶道蔽賢灾至絶世大兵起霜占霜乃地氣上升即成霧露風搏氣遍化為寒露陰寒又盛結而為霜露不時殺物誅殺之權不由君霜有芒角奸邪擅權陷害忠良
