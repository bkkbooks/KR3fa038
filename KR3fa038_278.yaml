body:
  text: 春風反熱禾傷民疫夏風反寒水灾人疫秋風反冷兵起人病冬風反暖兵亂人灾眊風疫水齒星君昏蔽賢兵火興灾惡風天氣昏國政混亂急病怒起邪風風熱連日不止國有兵灾殺害人民寵風惡陰遠不常天子偏愛人怨兵起逆風旋風物怒氣上沖在朝防守土宇在倒防守失位在家防盜火在營防沖聚寃風旋風攪土擊而復半下有寃枉伏尸告衷哭風風吉哀釋逵日火灾傷人兵受其敗敗風風降暴怒急不勻敵兵大敗我收奇功叛風風吹兩血地水赤奸邪謀逆兵起人灾亂風風熱生蟲食人衣物淫昏亂政兵起作亂風吹木柱木不傷君不思道民受其殃紅風氣陳赤推賢士憂灾奸邪兵起黑風氣聚昏黑寵蔽君失其政夷狄侵優神風魚急火光寇賊起兵殺害忠良鬼風急行人無兵有英謀將受凶敗賊風暴急吹尖人賊兵聚勢暗行沖襲水風如水浣適人刑濫兵起上下同灾不順風惡迸吹捅拘義塵國政橫逆民怨兵起
