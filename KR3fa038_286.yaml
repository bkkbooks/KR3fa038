body:
  text: 羽風克離方五風尤以日時為助亥子日時生震巽方栽勝淂糧克離方防灌水攻生角敵兵得助克徵風可哉敵糧寅卯日時生離方我宜火戰坤方防失土宇徵風防敵火攻克宮風可分敵土已午日時生坤艮方我勝淂地克乾兌方防失輻重生官風火宮失土克商風可奪輻重申酉日時生坎風我勝截水克震巽方防截糧餉生羽風防敵毒水克角風可截敵糧辰戍丑未日時生乾兌方可奪輻重克坎方防敵毒水
