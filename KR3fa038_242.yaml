body:
  text: 火守犯北斗兵起大旱火災守天牢火旱災人相食守太微常賫國有喪火入長垣胡人入國守文昌文臣災憂國亂兵起入犯紫薇異姓者王守三台勛臣災難久守兵起火入亢折威兵災火守天市垣米貴殺姦臣芒角失色火災守天田雷雨盧梁歲飢火旱災兩攝提天下大亂更主列肆尾宿天下兵起米谷貴氐宿大臣相譛逆行失色后妃大臣災久守有赦房宿兵起有赦十日火災二十日臣叛子逆兵旱百日大臣亂日星人主憂守犯大火之次光明黃潤天子更變禮法振奮威刑心宿地震久守臣謀主色黑天子凶箕宿天下亂久守大臣誅上水如海
