body:
  text: 火守犯北斗兵起大旱火灾守天牢火旱灾人相食守太微常賫國有喪火入長垣胡人入國守文昌文臣灾憂國乱兵起入犯紫薇異姓者王守三台勛臣灾難久守兵起火入亢折威兵灾火守天市垣米貴殺奸臣芒角失色火灾守天田雷雨盧梁歲飢火旱灾兩攝提天下大乱更主列肆尾宿天下兵起米谷貴氐宿大臣相譛逆行失色后妃大臣灾乆守有赦房宿兵起有赦十日火灾二十日臣叛子逆兵旱百日大臣乱日星人主憂守犯大火之次光明黃潤天子更變礼法振奮威刑心宿地震乆守臣謀主色黑天子㓙箕宿天下乱乆守大臣誅上水如海
