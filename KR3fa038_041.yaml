body:
  text: 白露日在軫六度弱去極八十四强秋分日在角五度强去極九十度半寒露日在亢八度弱去極九十六强霜降日在氐十四度强去極一百二度立冬日在尾十四度强去極一百八度小雪日在箕一度强去極百十二大雪日在斗六度去極百一十六强冬至日在牛二十度去極百一十五小寒日在女二度去極百一十三大寒日在虛半度强去極百一十度日影長短休咎舊時用八尺長竿當其冬至午時立于地中以測其影影長過舊規為行上道天下和平影短不及舊規為行下道霸業復興舊時地中則在洛陽漢時移陽城宋時又移在南台至今不知何處當中龍地尋之立春景長九尺五寸長短主歲疫麥不收成雨水景長七尺九寸五長短主多目疫早麥不收病癆瘵心痛驚蟄景長六尺五寸長短主多病癱疽脛多霧未不成老人病嚏春分景長四尺一寸長短主濕病人卒死病寒痢疾瀉清明景長長短主轂雨景長三尺二寸長短主老人病腫水灾病瘡死霍亂振寒立夏景長二尺五寸一長短主旱傷五谷病頭痛腫嗌牛畜多死小滿景長一尺六寸九長短主大喪病遂腫先水後旱病痺疼芒種景長一尺六寸八長短主痛厲死頭疼凶喪
