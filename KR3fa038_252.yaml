body:
  text: 鬼宿大臣謀逆久守大旱人疫米貴星宿五谷傷損天狗人飢歲凶張宿食盡有灾五谷傷損軫宿楚地兵五星合宿五星合宿名曰凌德君失宗社百姓灾凶四星合宿名曰大盤旱民屬百姓飢更主侯王兵喪三星合宿名曰鱉主天子絶行百姓飢更主侯王兵喪五星芒角名曰激大旱灾與兵起作亂合聚昜行無德宗廟失國家亡民怨兵起有德受慶于天奄有四海五星聚於東方中國平康五星聚於西方外國强盛金木合宿兵飢將危
