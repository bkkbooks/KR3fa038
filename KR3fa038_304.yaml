body:
  text: 五采霞成于春夏秋分初三五日大喜歲收歲大收霰占霰乃霞霓摶聚炫耀成紋散滿於天于采可現矣霰氣滿天君聽不聰邪奸欺蔽雹占雹乃陰陽屬氣逼剝而成聖人在上必無此物人言蜥蜴所謂誣矣夏時大雹首將為亂臣下欺君兵起大雹傷物政殘天怒歲凶兵亂大雹損兵破軍殺將失土不順冰占冰乃陰氣沍寒凝結而成薄聚成花斯為之吉兆冰結城山名曰冰介刑濫兵起冰結凝凍歲凶人灾霧占霧天氣下降而地不應臣下逆令之象地氣上升而天不應君上倨傲之象近山山氣成嵐近海水氣結湍春風揚沙霾皆不主於休咎畫之日白夜之月赤霧兆畫霧夜明君德不明强臣擅權
