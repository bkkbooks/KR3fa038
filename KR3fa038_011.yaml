body:
  text: 步天歌上垣上垣天廷太微宫昭昭列象布蒼穹端門口是門之中左右執法門西東門左皂衣一謁者以次即是烏天公三點九卿公背旁五點諸侯卿後行四個門西主軒屏五帝內座于中正幸臣太子并從官烏列帝後從東定郎將虎賁居左右常陳郎將居其後常陳七星不相誤郎位陳東一十五兩面星垣十星布左右執法是其數宫外明堂布政宫三個靈臺候雲雨少微四星西南隅長垣四黃微西居北門西南接三台與垣相對無兵災紫薇垣中垣北極紫微宫北極五星在其中人帝之座第二珠第三之星庶子居第一號曰為太子四為后宫五天樞左右四星是四輔天乙太乙當門路左樞右樞夾南門兩面營衛一十五東蕃左樞連上宰少宰上輔次少輔上衛少衛八少丞後門東邊大贊府西蕃右樞次少尉上弼少弼四相視上衛少尉七少丞以次却向前門數陰德門裡兩黃聚尚書以次其位五女史柱史各一戶御女四星五天柱大理兩黃陰德邊勾陳尾指北極顛勾陳六星六甲前天皇獨在勾陳裡五帝內座後門是華蓋并杠十六星杠作
