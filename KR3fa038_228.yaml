body:
  text: 木星名歲星十二年一周天四仲行三宿四孟四李行二宿絶於觜參木星有變對之方作災變色亂性姦邪作亂赤赤而沉其野隱曰歲星在其有大穰光明芒角其國大昌主仁主貌好生惡殺仁故曰福德虧貌失罰見歲星色青黃吉白則反乎金也木絶之咎安靜中度所臨之分吉變色亂行姦邪作禍芒角怒張縮小失色王者大臣災青色中空秋冬芒角大臣及齊地災久守分野不吉分野有官德政及民入月犯月野有𨑥相宗廟營空土木興入端門犯帝座入而不去臣革命入久而木犯三垣大臣有罪蝗蝻蔽野飢饉木星襲月后妃被點相臣災憂月蝕木星兵叛謀立逆入斗中大臣叛久守兵水災人飢變色逆行天助其神姦邪作亂守犯女床兵亂木守氐宿后有勢喜久守諸侯謀為王木守房宿五谷將收相憂心宿兵起臣謀君
