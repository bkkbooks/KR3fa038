body:
  text: 木星名歲星十二年一周天四仲行三宿四孟四李行二宿絕於觜参木星有變對之方作灾變色乱性奸邪作乱赤赤而沉其野隱曰歲星在其有大穰光明芒角其國大昌主仁主貌好生惡殺仁故曰福德虧貌失罰見歲星色青黃吉白則反乎金也木絕之咎安靜中度所臨之分吉变色乱行奸邪作禍芒角怒張縮小失色王者大臣灾青色中空秋冬芒角大臣及齊地灾久守分野不吉分野有官德政及民入月犯月野有𨑥相宗廟营空土木興入端門犯帝座入而不去臣革命入久而木犯三垣大臣有罪蝗蝻蔽野饑饉木星襲月后妃被點相臣灾憂月蝕木星兵叛謀立逆入斗中大臣叛久守兵水灾人飢變色逆行天助其神奸邪作乱守犯女床兵乱木守氐宿后有勢喜乆守諸侯謀為王木守房宿五谷將收相憂心宿兵起臣謀君
