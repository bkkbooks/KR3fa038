body:
  text: 栁宿赤色火災動久守天下兵起星宿五谷不登盜賊並起張宿內出兵起翼宿王道興文土用久守大臣責五谷傷人維凶魚貴兵大聚軫宿國有喪水星名辰星一年一周天春見婁奎夏見東井秋見角亢冬見牽牛出入以辰戍丑未出早主日蝕出晚為彗星冬不見陰雨春不見大風夏不見主旱秋不見主兵其性主智主謀智虧謀失罰見辰星常隨日前後不可妄見見則夷狄兵寇宰相災四季不見天下大飢出水失時邦有大飢人死當出不出為擊卒當入不入為漏明皆主兵亂水失行度非時光明天子以薦人為后
