body:
  text: 地變難支此之謂也天占天忽開裂陽不足也國主起兵土地分拆天門忽開陰氣沖破土地分拆中國更主天起陰霾陰氣結滯君臣離心陰謀作亂天變昏黑陰氣盛也君德不明姦邪欺罔慘黃慘白風雨之兆陰謀兵變火災憂喪忠良災天日久陰陰氣重盛東夷起兵侵犯中國天色青碧陰冒陽也陰謀起亂兵喪為災天赤如血陽氣太盛所現之方火焚公宇天鳴有聲天鼓鳴也所鳴之方兵變疫生天作暴寒陰剝陽也國有陰謀野有兵變青氣如虹吉祥之兆時雨降賢人出黃氣如虹天賜禎祥國生賢嗣將相得人白氣如虹憂氣太甚水災歲凶刑濫兵起黑氣如虹陰氣沖盛水災歲凶黃氣繞貫二斗吉祥為兆歲豐人安國生賢嗣赤氣繞貫二斗陽氣妄現火旱災興歲凶兵起天雨骨陽氣消㜰兵役盛興國破啓亡天雨囱名曰天傷侫人䘵功臣戮多寃獄
