body:
  text: 點水滴涷百物凍傷小人爭權陰謀叛逆雪盛滿地獨無雪豦下有古井古窯或金歲寶物七八月寒雨成雪陰盛奪陽刑濫嚴酷賊兵大起大寒凍死鳥獸百日不解君不檢德百姓被苦亦妨取害政者酷寒水盛畫成水搖起如山日水介甲兵象兵起非時而雪水賊臣為亂兵戈大興虹占未雨之始大雨之終虹乃天地陰陽不正之氣結而成之其虹不宜時常有之出現但隱之為吉兆虹頭至地非雨而見民灾流血無雲雨虹出主風雨不雨國有陰人禍虹𡸁殿前君無仁德國家更主兵火為灾兵出忽霧虹見兵灾將凶虹作象鼻捲上兵戰灾虹作三五斷交兵必敗虹見於夏秋谷多傷虹見於冬春麥大損旦見於西主風雨暮見於東無雨夜白虹臣憂灾
