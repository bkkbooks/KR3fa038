body:
  text: 兩咸搖動天子淫泆無度尾宿太子災久守后族逆𡡮妃賣權至旱箕宿轂貴人飢后宮多口舌牛宿大水災山澤猛常傷人建宿歲飢人餒女宿大水災人多凍死虛宿昭穆失序人多飢疾瓠派派果不熟魚貴離宫東有喜西米貴南旱北喪憂危宿天子大興宮室奎宿北夷懷服墳墓宗室不敬有哭泣𨐧宿大臣有災婁宿牛馬多死米貴人飢有赦胃宿人多病死久守五谷不實昴宿米貴人飢君嚴刑罰觜宿人飢久守將兵在道五谷損傷參宿歲大疫井宿王法多獄訟守七十日天下更變有赦鬼宿國有兵喪久守天下半死
