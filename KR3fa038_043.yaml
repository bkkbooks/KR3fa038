body:
  text: 夏至景長一尺五寸長短主病目瘡水早為殃大寒夏捐華木小暑景長一尺七寸長短主病顱腫前小水后小早腹疼大暑景長二尺長短主悪疾脛腫暴兵歲㐫病觔痺胸痛立秋景長二尺五寸三長短主病咽喉痤痛暴風殃来年黍不收處暑景長三尺五寸三長短主耳病脹病兵起来年麥不收白露景長四尺五寸五長短主病水腹疝闭癰疽秋分景長五尺五寸長短主病膈痛溫病寒露景長六尺八寸五長短主熱病来年五谷不成疝病霜降景長八尺四寸長短主病腦觔痛歲大風草木耗腰痛立冬景長一丈四尺二分長短主病臂痛早旱晚水萬物不成小雪景長一丈二尺四寸長短主肘㿥痛来年麥不收脚病大雪景長一丈二尺五寸六長短主患癰疽来年夏水多五疽水腫冬至景長一丈三尺二寸長短主水瘇心疼歲旱人安小寒景長一丈二尺三寸長短主熱病先小旱後大水喉痺病大寒景長一丈一尺長短主病上焦咽腫先大旱後大水麥不收多病測日之景湏當扵節日日午時騐之日占日暗無光日華五采天下太平王道大行賢臣進用日暗無光陽道哀微君信谗邪陰謀憂喪黑杠分日陰侵陽也土地分拆直杠南北横杠東西日光相盪陰陽不和奸邪叛逆更置圖命数日相闘陰陽混雜兵起作乱分拆土宇日月並行陰奪其陽奸邪專權即行弒奪
