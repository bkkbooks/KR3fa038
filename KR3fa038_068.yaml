body:
  text: 北斗七星明則國昌暗天子災樞星暗不敬宗社璿星暗廣營宮室山陵璣星暗妄行徭投權星暗號令不合天道衡星暗廢棄正樂開陽暗嚴刑峻法賢用侫搖光暗不祀山川社稷輔星明小吉明大臣奪君政小而不明不得人明大芒角近臣作亂宰相明小吉不見國政不理芒角強臣擅權三公一星亡天下危二星亡天下亂三星亡國無賢臣勢星暗則吉明大宦官用事變色芒角宦官作亂太尊明主吉暗天子無德天乙光明陰陽和萬物成人主吉星亡天下亂太乙暗昏移徙兵災人飢失次變色宗廟不享內厨明盛無華采主上膳有毒文昌光明黃潤百戰理文學昌青黑微小君有災動搖移徙文臣災天理暗則刑獄簡明則貴人被誅天槍明則兵起失色芒角兵起火災
