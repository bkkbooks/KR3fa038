body:
  text: 物也地不滿於東南則陽盛陰微其氣暖亦且江海而潮潤滋灌得中以成萬物也東南之氣春首三陽先動夏不雨近湖則水氣以成煙霧近則塵埃以成雲藹近山則嵐氣以成昏暝並皆遮天蔽日春夏氣如煙火秋冬氣如陰霾此皆天道之常不足以占休咎也天漢天河乃南北陰陽不足以象也起自東南尾箕之間分為二道南道徑傳説魚星天淵天䈁天辨河鼓也北道徑龜星斗魁左旗俱至天津之下合而為一西南至須女夾瓠瓜人星杵星造父螣蛇王良附路閣道大陵天船卷舌南過五車口北河入於東井水位南河闕丘天狗天紀天稷沒于七星之南是則天漢所次之也天變天變者父怒也父道尊而嚴戒其子者事之常雖變而災害不甚也地變地變者母怒也母道慈而順戒其子怒必甚雖少變害亦甚也况於山崩川竭之大變乎故曰天變可逭
