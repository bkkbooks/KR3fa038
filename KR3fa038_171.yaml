body:
  text: 天莭明吉暗凶天𨵿芒角兵起津梁不通諸王明則藩臣盡禮暗則臣下專政不見社稷危兵大起天潢不見津梁不通天園曲則百穀熟直歲飢參旅直兵動曲不常王者誅殺不當芒角兵大起九洲城口星亡天下擾亂五車均明吉暗國絶移動變色兵起柱出外米貴五星守留天子巡遊
