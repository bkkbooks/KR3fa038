body:
  text: 與月合宿主雨水其國兵起亡地與月同色赤兵畢旱水黃歲收四季不見天下大亂變于房星國憂地震水守貫索歲飢米貴月暈辰星下春旱秋水兵起守犯天田主水災水星入月臣下謀叛守氐宿大水漂宮室人民憂夷狄兵起水守房宿姦臣宮君水出房間地震姦臣謀逆水守心宿大水災尾宿天下水災江河泛溢箕宿人災水守危壁魚鱉星天淵水位北河皆主大水滔天建星水災米貴人多疫疾牛參兵災女星水災萬物不成虛宿同前昴宿人民多疫執政之官被誅
