body:
  text: 風起日下有雲鳥潤吉蒼白水灾赤黃旱牧男女風起月下有雲鳥潤凶赤白旱水為灾兵喪繼作女方暴風起于東北東南建水吉鳴如蝗蟲旱灾冬至無風有赤在日上下左右歲灾大旱生蟲冬至無風有鳥雲上下左右歲收民安風雨不常於已酉日大輔息宥獄囚陰午日盜賊兵起亥卯日下害上陰謀作丑戍日淂賢臣決寃獄天氣白色主風雨五風占宮風大則聲隆小則如牛鳴窖作酸馮莓氣商風大如小如離羊作銅辛血腥氣角風大如石小如難作煙糊燒景氣徽風大如火起小如室作硫磺火禁氣羽風大如瀉水小如作水腥魚氣宮風屬土商風屬金角風屬木徵風屬火羽風屬水乾兖屬金坤艮屬土震巽屬木離屬火砍屬水
