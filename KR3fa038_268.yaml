body:
  text: 軍市軍民糧阻絶器府禮樂廢兩轄兵起陽門外兵動南門兵至杵星米貴兵急壁星多風雨多灾害天廟祠官有憂良星占良星乃德星名也其明大而中空找三星相聚赤氣中國昌文士出壽星大星在西光明黃潤天子壽考多歷年數祿星黃光在赤氣中國昌文士用世景星如半月黃光任用文士天下太平周伯星黃光照光所見之方有大喜慶舍譽星明如彗明出國昌軍德蠻夷入貢天保星流星隆于四崇有墜方有喜但防火灾慎星赤光四六半衣現步主十月之內有兵
