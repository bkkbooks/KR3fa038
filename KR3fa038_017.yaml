body:
  text: 尾宿九星如鈎蒼龍尾下頭五點號龜星尾上天江四橫是尾東一星名傳説傳説東畔一魚子尾西一室是神宫所以列在后妃中箕宿四星形狀似簸箕箕下三星名木杵箕前一點是粳粃斗宿六星其狀似北斗魁上建星三相對天辨建上三三九斗下圓安十四星雖然名鱉貫索形天雞建背雙點星天籥柄前八黃精狗國四方雞下生天淵十星鱉東邊更有兩狗斗魁前農家丈人斗下眠天淵十黃狗色玄牛宿六星近在河岸頭牛下九星是天田田下三三九坎連牛上直建三河鼓鼓上三星號織女左旗右旗各九星河鼓兩旁右邊明更有四黃名天桴河鼓直下如連珠羅堰三烏牛東居漸台四星似口形輦道東足連五丁輦道漸台在河許欲得見時近織女女宿四星如箕主嫁娶十二諸國在下陳先從越國向東論東西兩周次二秦雍州南下雙鴈門代國向西一晉申韓魏各一晉北輪楚國一星魏西屯楚城南畔獨燕軍燕西一郡是齊鄰齊北
