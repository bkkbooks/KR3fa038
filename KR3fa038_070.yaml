body:
  text: 玄戈明大生角圻內兵乱胡兵盛天牢暗刑獄煩明則政刑繁乱中有小星主貴人下獄太陽守安凶明吉星移內侍乱文臣誅漢書天文志言北斗九星按斗七星宗志云第八弼星不見在第七星之右第九輔星在第六星之左常見故稱九星也紫微垣
