body:
  text: 離宫米貴人死天下亂有兵主淂地奎宿兵草起亂武庫耗散婁宿刑濫兵起郊祀不敬天子絶嗣胃宿倉糧耗杇百谷不成昴宿臣稱王命胡兵為革中國擾亂天苑天厩祀官庖丁灾凶觜宿奸臣謀逆將凶色黑人死參宿外國兵亂邊人流血井宿水灾兵起人相食君王走鬼宿歲凶人死兵起栁宿周分兵起庖宰太甚希鹽貴酒旗天下大順賜爵宗室星宿急兵水灾久守同行謀逆天厨外厨祠官庖丁灾凶張宿兵灾人死賞功不當軒轅后灾兵起國君頌赦翊宿天子淫佚兵灾國危軫宿兵草亂起寇敵來降玄戈胡兵大敗八轂年轂不登
