body:
  text: 天雨血名曰天妖為淋尸水兵起血戰灾疫行天雨毛金失性斥賢人辱貴人役土木天雨脂如甘露名曰天殘君比淫朋天雨金名曰刑餘主殘害兵戈起亂天雨木陽道閉塞歲凶人疫楖相有難天雨草火失其性天生旱灾民飢兵起天雨花木失其常國君淫嬖隨飢民貧天雨絮木失其性民貧兵起天雨石天鼓墜下臣叛君危兵變國亂天雨灰土失其性君虐無道奸臣謀逆天雨墨天獄濫興臣下殘虐寃獄迭起天雨釜火失其性歲凶民貧得釜者興天雨五谷木失其常歲凶人飢兵戈亂起天雨魚鱉兵戈之兆干戈作亂國主不安天雨水銀寇兵起天雨膏將相敗績人民屠戮天雨赤水兵盜屠城天雨墜龍國君失位天分為二王者分土又主君灾游氣黃黑三日兩防兵火灾
