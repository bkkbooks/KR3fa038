body:
  text: 五重后灾六重君灾七重天下易主八重世亂九重亡國月重白暈王謀立兵主久戰月暈赤白將相離心殘賊誅戮入斗大水入城兵起有赦貫索天下叛逆有雲橫貫起兵者勝重光于下兵起華亂將帥灾危有氣橫冲寇勢驍勇冲營殺將連環白虹出外后妃陰謀立見弒奪外有珥璚主六十日兵起外賊亂有現垂下兵戰凶灾外有背珥陰謀弒奪終不能賊月有背璚臣下縱欲互相殘賊月終歲不暈天下太平偃武修文一月月暈五次君上無道將失土宇月蝕月蝕者乃陽氣大盛于九道交行之時冲掩月光故張橫渠曰君子用志月蝕青色五谷貴赤色火旱白色兵喪黑色水憂黃色王侯謀立月盡蝕女后難將軍灾五谷貴大人憂貴人死不盡破軍殺將國主憂灾月蝕從上君失其道國家有難從下君令不信相臣灾危從旁法度不密將軍有灾兩間兵草亂起大戰彗射入將相灾危有兵起射方擊之大勝緩三日雨主百事盡散
