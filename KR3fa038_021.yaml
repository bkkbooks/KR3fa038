body:
  text: 土工兩點壁上藏奎宿腰細頭尖似破鞋一十六星繞鞋生外屏七烏奎下橫屏下七星天溷明司空左畔土之精奎上一宿軍南門河中六個閣道通附路一星道旁明五個吐花王良星良星近上一策名婁宿三星不勻近一頭左更右更烏夾婁天倉六個婁下頭天庾三星倉東腳婁上十一將軍浮胃宿三星鼎足河之次天廪胃下斜四星天囷十三如乙形河中八星名大陵陵北九個天船名陵中積尸一箇星積水船中一點星昴宿七星一聚實不少河西月東各一星河下五黃天陰名陰下六烏芻蒿營營南十六天苑形河中六星名卷舌舌中點點天讒星礪石舌畔斜四丁畢宿畢似爪叉八星出附耳畢股一星光天街兩星畢背旁天莭耳下八烏幢畢上橫列六諸王王下四皂天高星莭下團圓九州城畢口斜對五車星車有三柱任縱橫車口五個天潢精潢畔咸池三點星天關一星車腳邊參旗九個
