  text: 角宿星名以下東方七宿角宿頭上頂天田平道天門及進賢衡鎖庫樓連五柱南門樓外兩星橫角宿左角主邢右角主兵明大天下和平動移王者出遊暗及芒角國失政弱小國弱強大國強周鼎不見連祚不安移徙人民沐離五柱半不見天子自將出兵天田明潤歲驗不見五谷不收南門明則遠人來賓
