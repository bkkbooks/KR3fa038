body:
  text: 虹見五七日天子出遊雲如虹方暴兵之象赤虹入人家大災虹頭入井所見之方兵火為災虹光交見色青民疫色赤火旱色白兵喪色黑水憂畫白虹君憂災虹𡸁軍營宜急遷營以避破軍殺將不詳之事虹光景出姦邪成風人民淫欲虹見五七重傷物太重為災極大道光二十有二年冬子月十二日抄完抄寫與原本無差玉甫原字藎臣述天文祕旨卷之五終此本共記十九篇
