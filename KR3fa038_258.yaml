body:
  text: 流星黑大人多灾疫流犯木星國危失地流犯奎星兵草起流犯火星外國詐謀流犯水星水灾流犯土星訢使求土流犯填星外國奸人入國色赤旱黑水流星有赤青三二犬名天雁將相兵出流星大如壅紅白長数犬緩白青化雲流下所下之方有流血積尸之兆客星占客星非常有見之星偶見干天乃上帝譴告之使也見日多事禍深大期遠見日少事小禍淺期近色變芒角大而忽微陰謀干上兵起之兆純白色所見之國米貴灾飢彗孛占彗體無光借日而見晨見則西指夕見則東指光芒長短所及為灾芒短其灾淺其期近芒長其灾深其期遠𡸁象于天子即位之年欲其除舊更新也彗見平時主水灾兵起彗緩曲象旂兵灾愈甚两軍相對得柄者勝隨芒指豦擎之必破藏彗王侯破天子芳兵白彗兵喪水灾將軍逆
