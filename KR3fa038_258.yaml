body:
  text: 流星黑大人多災疫流犯木星國危失地流犯奎星兵草起流犯火星外國詐謀流犯水星水災流犯土星欣使求土流犯填星外國姦人入國色赤旱黑水流星有赤青三二犬名天雁將相兵出流星大如壅紅白長數犬緩白青化雲流下所下之方有流血積尸之兆客星占客星非常有見之星偶見干天乃上帝譴告之使也見日多事禍深大期遠見日少事小禍淺期近色變芒角大而忽微陰謀干上兵起之兆純白色所見之國米貴災飢彗孛占彗體無光借日而見晨見則西指夕見則東指光芒長短所及為災芒短其災淺其期近芒長其災深其期遠𡸁象于天子即位之年欲其除舊更新也彗見平時主水災兵起彗緩曲象旗兵災愈甚兩軍相對得柄者勝隨芒指豦擎之必破藏彗王侯破天子芳兵白彗兵喪水災將軍逆
