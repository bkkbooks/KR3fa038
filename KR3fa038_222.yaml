body:
  text: 緯星象金木水火土五星羅織于天有遲有該有順有逆所以謂之緯星也金星一名太白一年一周天出以辰戍入以丑未出東方二百四十日過西方又二百四十日與日同南北之行為盈分南北之行為縮出早主月蝕出晚主天妖出晚主天妖出東方為啓明出西方為長庚主義兵主旱義虧言失罰見於金當出不出當入不入天下兵起外堅內空外勢張而不實內實外空內藏謀而外拐虛始大終小兵漸始小終大兵漸强晨見於太陽之前主夷狄客兵敗夕見於太陽之後主中國兵敗隨太陽終于正南爭耀而光明不失主弱國强强國弱更有王天下者兵起女主出分屬秦晋之分畫見速入兵易止遲入兵難遏光明不失與日爭光天下更主兵起太白犯月兵起將凶
