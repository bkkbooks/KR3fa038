body:
  text: 風占風者天之號令非時傷物者凶順時生物者吉山體陽通於天氣出雲靄以成雨海體陰通於地氣出赤黑而成風近山風大而塵昏近海風大而昏黑軍聚埃與馬行塵起旋風作於一時暴風揚於百里細風及於一方大風遍於天下自然之也不主灾咎天色氣慘黃主風或火灾大作羣鳥噪空翻飛群魚出水跳躍星動搖月有暈昏暗雲片相逐雲色慘白聚散不常圍繞日光日色昏暈雲腳黃日光赤日光搖雲行急月暈圍雁鳴如鵝聲蟻出穴石脉潤耳頰熱頭癢燥濕熱太白晨見參宿動搖燈花熖搖或鳴有聲樹脂流出楊栁根紅蚯蚓過路蛇遊高年龜鱉晒暘皆主風兆春甲子風國主頒赦夏丙子風旱灾兵荒秋庚子風刑濫兵起冬壬子風水灾國憂四季戊子風歲收君吉頒赦風起丑未日賢臣決寃獄風起寅午日盜賊兵起風起亥卯日陰謀干上風起辰申日奸邪謀逆風起已百日恩宥邢獄
