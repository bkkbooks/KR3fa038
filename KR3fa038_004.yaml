body:
  text: 于斯矣鳴呼吾之不壽不遇者天也命也吾何與焉但道也者天之工器也苟祕之而不傳則知之者少知之少則道不幾于息乎于是強病以述其事之顛末命子書之于卷首庶後人從是道者知源流有自而維世有方也如此則惠之於人不亦傳乎吾復何憾因序以貽後云祕書傳派之源伏羲始書八卦以明天地之道以開先天之學也黃帝始以八卦而破蚩尤太公參六甲八卦五行以滅商與周周公以二天之道作洛邑永周柞誅武庚管蔡鬼谷子味祕書于紫霞洞后以兵法授孫臏黃石公推衍祕書作六韜後授之張良張子房得兵法于圯橋勛炎漢之業諸葛孔明味祕書于隆中增置三奇八門替漢鼎峙李淳風得祕書于孔明相中助成李唐之盛陳希夷玩祕書于華山亦有用世之志及見太平天子遂隱而不出故以宋未得其傳劉伯溫先得六壬遁甲子于高安後得全書于鼎湖贊成明祖漚胡之績道光二十二年壬寅仲冬之望玉甫豐烈書
