body:
  text: 日暈赤色火旱興灾兵起血戰白色國有幽喪兵膭不寧黑色國有憂危蠻夷亂起黃色國昌歲稔有兵則得勝昏黑夷狄寇盜兵起四重海兵作亂百物消耗五重有德者昌無德者亡四口兵有謀略讒侫害將五口王侯謀逆篡弒其君七口謀逆立見不時常暈天子失御民多怨背日重暈天下有王侯謀立日暈有色變成龜紋主二兵相守我勝敵走日蝕日食者是日月交行九道之中偶值陰氣旺盛月行上道故掩日而為日蝕也橫渠所謂人用力可謂善於比譬矣正旦日蝕陰勝其陽君德昏蔽奸邪欺謀四旦日蝕陽不勝陰陰謀立成內變將作十旦日蝕陰胃其陽君昏信讒陰謀作亂日薄蝕陰謀弒奪不按朔望而食不交而食相食日赤無光皆曰薄蝕日盡蝕陰氣太盛陰謀害君蠻夷華夏日蝕角中刑政濫兵戈起亢中謀國有變氐中后妃失怨房中壬震國亡心中歲旱兵起尾中貴人被刑箕中天下兵亂斗中帝后有凶賤人暴貴
