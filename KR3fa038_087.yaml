body:
  text: 天紀明盛多獄訟暗則紀綱廢亡則政荒不見地震山崩國打亂連貫天下兵起女床明大驕恣起於宮人貫所九星明大天下訟獄繁七星現小赦五星六星現大赦索中星多囚多星少因少中虛天于政荒口閉人多吊孔星入獄訟大星出外大赦小星出外小赦經星占經星乃二十八宿與衆星也或芒怒變色移徙觸躍此其氣之盛也或縮小就聚昏蒙無主此其氣之弱也各有灾祥之可占大端列縮循度安常則吉越度異常則凶其驗之甚
