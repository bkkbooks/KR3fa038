body:
  text: 牛宿星名牛宿相縳河上居天田九坎上天桴羅纏織台通輦道河鼓分明遠二旗日月五星之道天之開梁主犧牲主南越牛宿明盛王道昌津通暗小梁滯不登五轂中星移下上牛多死小星亡牛多疫移入河中天下大亂星直米價平星曲米貴天田明潤年豐赤色主旱暗亡主水九坎暗吉明主大水灾天桴動搖軍鼓動暗則軍更漏失時羅偃暗則吉明主大水灾河鼓明大正直將有功由主失計自殺漸台明則陰陽和律呂音正二旗暗主兵憂動搖參差兵起左旗黑色急備兵輦道動搖不見于御道有兵迹織女大星芒怒布帛貴不明兵起一星亡大亂女工為役
