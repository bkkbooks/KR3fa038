body:
  text: 紫微垣名斗前有個紫微垣勾陳天皇帝王躔帝座君星亦君事陰陽德主愛民先六甲天厨司時令要知八轂兆時年內階天床主內石天厨上膳味兼全尚書四輔天臣位二史專司作史編天倍主兵刑大理內侍華蓋并兩垣傳舍王接遠方使后妃大子列星前更有庶子星一點各以其星占候玄兩垣明大吉暗亡術蕃不密星直子自將出兵勾陳明則帝后有序暗則主人拂意天皇隱而不見凶明大天子明德有道席座正則君德正移徙垣外帝王出遊北極明亦君德吉暗或色凶天下無主四輔明小吉盛大臣逼君凌奪君政尚書明小賢臣輔國盛大則臣逼君政事廢弛六甲明則陰陽和暗則寒暑易莭女史明史臣輔戰暗則史臣侫
