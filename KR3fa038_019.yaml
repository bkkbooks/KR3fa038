body:
  text: 兩邑平原君欲知鄭在越下存十六黃星細區分五個離珠女上星盿瓜珠上瓠瓜生兩箇各伍瓠瓜明天津九箇彈弓形兩星入牛河中橫四個奚仲天津上七個仲側扶筐星虛宿上下各一連珠狀命祿危非虛上星虛危之下哭泣星哭泣雙雙下壘城天壘團圓十三星敗臼四星城下橫臼西三箇離瑜明危宿三星不直舊先知危上五點號人星人畔三四杵臼明人上七烏號車府府上天鈎九黃星鈎下五鴉字造父危下四星號墳墓墓下四星號虛梁十箇天錢梁下黃墓旁兩星能蓋屋身著皂衣危下宿室宿兩星上有離宫出繞室三雙有六星下頭六箇雷電形壘壁陳次十二星十二兩頭大如井陳下分明羽林軍四十五卒三為群軍西四下多難論仔細厯厯看區分三粒黃星為鐵鉞一顆真珠北落門門東八魁九個子門西一宿天綱是電旁兩點土工吏螣蛇室上二十二壁宿兩星下頭是霹靂霹靂五星橫著行雲雨之次曰四方壁上天厩十圓黃鐵鎖五星羽林旁
