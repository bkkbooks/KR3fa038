body:
  text: 昴宿星名昴宿河邊伴月明又兼礪石對天陰許多藳藏天苑卷舌天讒莫妄與天之耳主獄事主胡兵昴宿明獄事平無侫臣動搖君信讒害忠良六星明與大星等大水七星俱黃兵大起一星亡兵喪一星跳躍蒙動明盛跳躍胡兵亂起月星明大女后擅權大臣專政卷舌曲而靜賢人升直動讒侫進出漢多妖言天可明大山林妖變黑亡陰陽不和天讒移動多口舌兵起明大巫醫搆亂不居漢中主多妖言礪后明則兵起天陰明則禁言漏世天子遊畋藁明盛豐穰不見牛馬暴死天苑明盛禽獸盈甚稀暗禽獸散亡
