body:
  text: 婁宿星名婁宿不均近一頭左更右更為夾婁大將軍在婁頭立天倉天庾婁下浮日月五星之道為天獄主兵主犧牲婁宿明大天下平郊祀享天下孝多子孫動搖兵起星直有執主命者就聚國不安大飢國君出走左更山林澤藪芒角山間盜兵起右更主牧牛馬明則犧牲繁暗則病損將軍明潤兵政威暗則兵弱小星不見兵政廢天蒼天庾明大歲熟相近就聚粟積多相遠粟虛耗暗歲歉不見歲大飢
