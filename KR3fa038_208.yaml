body:
  text: 軫宿星名一点長沙軫宿中青丘七對土司空又見軍門排两轄許多器府樂声通冢宰輔臣主風雨車馬出入軫宿明大天下安寧四夷来王動搖車馬用移徙天子憂就聚兵大起長沙明主壽長子孫昌盛大兵起軍門明大芒角兵起移徙道路不通土司空明吉暗天子乱徭役煩清丘主東南夷芒角動搖蛮夷作乱两轄明則兵起近軫言遠軫凶不見國有大憂喪噐府明則礼樂與音律和暗則為樂凶
