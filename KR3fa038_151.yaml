body:
  text: 奎宿星名以下西方七宿奎宿元伴上之精外屏天溷閣道成附路王良真有忘為陳一策軍南門天之武庫主邊兵奎宿明小吉暗則臣下有于命者又起白衣會稱兵于山谷芒角帝政淫佚動搖則兵起王者宗祀不潔光熖近臣謀叛起兵又王飢司空光明黃大天下不安策星移動兵起外屏不見移徙人不安蕃衛不謹
