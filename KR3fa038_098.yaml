body:
  text: 氐宿星名氐宿似斗側量米帝席招搖及天乳梗河之下有咸池騎車將軍天輻裡氐宿明大臣奉法國家安康暗小則臣下失战動搖臣下作乱帝席明王公淫樂招搖明大不正蠻夷不受命芒角兵起天乳明潤雨澤均不見主旱不莭梗河與玄武相向兵草動星亡國有謀兵咸池移動開津有变車騎眾星均小天下安盛大芒角兵起不見兵大乱將軍動搖將軍征不見將軍死暗將軍弱天輻色變動搖芒角輦轂有變
