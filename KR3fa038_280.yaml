body:
  text: 不澤風木不南旱風吹禾私利弊公民灾國危天報風入營吹到兵器急防敵沖縱火焚營報且風起天急兵卒至謹防沖襲引兵風宜備驍勇護其入豦惡北風兵士謀叛急宜動賞風聲清烈如裂布帛屬商征伐動兵歲疫人死大風鳴高下不齊屬角兵戈大動王思宥大風烘如搖炎火屬徽兵火作灾風如湍流塞其聲屬羽奸謀暗起天彂暈氣大風揚沙至德潛晦兵火與灾天氣常鳳不用賢才國政昏亂大風起天子背政隱德不用賢才大風枝木天怒之象兵火與灾旋風幾日不止政失民怨兵亂屠城暴起氣風吉如破數兵變之象冬至日起風乾方來歲大收墳方歲收民安民方大小民疫震方歲豐巽方歲收國安離方寒主水熱主旱坤方蟲食谷不實兌方兵民病國灾
