body:
  text: 不澤風木不南旱風吹禾私利弊公民灾國危天報風入營吹到兵器急防敵沖縱火焚營報且風起天急兵卒至謹防沖襲引兵風宜俻驍勇護其入豦惡北風兵士謀叛急宜動賞風聲清烈如裂布帛屬商征伐動兵歲疫人死大風鳴高下不齊属角兵戈大動王思宥大風烘如搖炎火属徽兵火作灾風如湍流塞其聲属羽奸謀暗起天彂暈氣大風揚沙至德潛晦兵火與灾天氣常鳳不用賢才國政昏乱大風起天子背政隱德不用賢才大風枝木天怒之象兵火與灾旋風幾日不止政失民怨兵乱屠城暴起氣風吉如破數兵變之象冬至日起風乾方来歲大收坟方歲收民安民方大小民疫震方歲豊巽方歲收國安离方寒主水熱主旱坤方虫食谷不寔兌方兵民病國灾
