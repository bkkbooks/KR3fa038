body:
  text: 鞏昌府慶陽府延安府文府慰寧夏龍安府鬼雲南府大理府臨安府楚雄府徵江府保寧府敘州府重慶府嘉定府雅州府瀘州眉州岷州府洮州府曲靖府栁河南府張南陽府翼軫桂林府栁州府慶遠府平樂府潯州府南寧府武昌府漢陽府襄陽府德安府黃州府荊州府嶽州府長沙府衡州府辰州府永州府栁州沔陽府安六府䕫州府亷州軫寶慶府靖州府平涼府施州府天文祕㫖卷之三終此本共篇
