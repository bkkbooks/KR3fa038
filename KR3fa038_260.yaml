body:
  text: 赤彗旱火灾城兵起女奪后妃之權黑彗陰謀大水江河決賊大起黃彗兵喪殃民國失土宇彗入月中兵大起飢饉彗犯月臣下謀逆入月無光一年國亡土地失彗在月上四夷兵起彗貫月奸臣謀君灾孛體光芒四出亦非常之氣所見之方有大謀大亂火灾蔽暗不明有大傷宮客星彗孛守射衆星守射北斗先兵亡次兵殃後兵昌守射文昌文臣灾武臣盛逆文士多難輔星諸侯爭權凌逼天子衡星天子昜政四方兵起帝座帝星有人逼君公相兩垣大臣灾憂即位即將將師憂危天市垣百物消耗兵大起改遷都市角門刑罰濫外國有來使重釋納貢左角兵亂起刑罰濫右角兵亂起
