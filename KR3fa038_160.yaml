body:
  text: 胃宿名星胃宿𪔂立大河嬪積水天舡也伴明天廩滐藏天困畔又見積尸埋大陵為天厨主倉痯事胃宿明廩實天下平暗倉虛米貴就槩轂貴星亡兵起動則有輸邊事積水明大兵水為灾積尸明大人死如林天舡明大多水不居河中津梁不通移徙不見兵起
