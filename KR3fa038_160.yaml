body:
  text: 胃宿名星胃宿鼎立大河嬪積水天船也伴明天廩滐藏天困畔又見積尸埋大陵為天厨主倉痯事胃宿明廩實天下平暗倉虛米貴就槩轂貴星亡兵起動則有輸邊事積水明大兵水為災積尸明大人死如林天船明大多水不居河中津梁不通移徙不見兵起
