body:
  text: 太微垣星名北斗至後太微宮左右執法垣西東帝座內屏諸侯位九鄉謁者及三公幸臣太子從官列即位更與常陳逢即將虎蕡夾左右三台左畔少微通長垣之下靈台設還有明堂出政同帝座光明天子從容中道則君昏宜急求賢才以自輔內屏光明潤澤人臣尊敬君王執法芒角移徙行政苛刻
