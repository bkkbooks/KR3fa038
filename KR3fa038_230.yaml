body:
  text: 天困歲凶人飢昴宿胡兵大起畢宿天下口舌橫議參宿國臣更張大臣作亂兵起于邊主生謂太白渴入井為千觜宿井宿國昜政兵盜起參中天子失位兵喪栁宿兵勝益地將軍有喜鬼宿國有大喪將軍灾憂張宿天下昜改亂臣兵起星宿兵起軒轅皇后失勢翼宿兵亂軫宿水灾楚地兵起
