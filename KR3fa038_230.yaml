body:
  text: 天困歲凶人飢昴宿胡兵大起畢宿天下口舌橫議参宿國臣更張大臣作乱兵起于邊主生謂太白渴入井為千觜宿井宿國昜政兵盜起參中天子失位兵喪栁宿兵勝益地將軍有喜鬼宿國有大喪將軍灾憂張宿天下昜改乱臣兵起星宿兵起軒轅皇后失勢翼宿兵乱軫宿水灾楚地兵起
