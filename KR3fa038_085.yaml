body:
  text: 天市垣星名天市垣居南斗前二十二星圍一垣帝座侯星及宗政宗人宦者斗斛邊市摟車肆并列肆屠肆帛度更相兼七公天犯及貫索還有天林織女連市垣一星亡其國有災垣中星多潤澤主歲實星少枯淡主歲歉帝座明大光潤天子歲令大行微小凶移出垣外天子巡遊宗正明小宗族安盛大芒角宗屬生變宗人明潤宗族有序動則宗屬事煩侯星明小輔相得人盛大輔臣弱亡天子失位移徙主不安七公齊正國法平明大輔臣強宦者明盛芒角閹寺作亂車肆明吉暗則兵陳起市樓明吉暗則市賈不利屠肆明大主屠多宰殺列肆移徙至商賈不安帛度明則度量平商貨不欺
