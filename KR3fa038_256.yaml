body:
  text: 流星乃天上譴告之使長大者事大其禍短小者其事小其禍連先大後小憂抑于國先小後大國有吉慶大而有光貴人多災小而光盛小人謀叛蛇行屈曲陰謀暗害色赤無光憂使告變減而復光詐偽事成久見始減大風傷物流青名天雁歲飢國憂流赤名見雁火旱與災流白國有兵喪流黑主水災流黃大興土木流星盡損名頭兵起赤流犯月后災臣叛軍將災入月有光兵起國亡流出月暈陰謀泄漏流星有聲急兵作亂流光燭地百谷傷損流星共聚賊謀作亂流三投四柱營破將亡流星隍營兵敗將凶大星流衆星隨民流君災兵敗將亡流星赤壁所墜之方人疫流入昴畢內兵通夷作亂流入三垣流犯天台勳戚災凶流入角門外夷通使流犯文昌文臣有難流曲入房諫官災危流如掃帚賊寇作亂流入參宿外兵疫死星昏而流雨水為災流星破辟年多蝗蟲二星共流亂兵爭鬪
