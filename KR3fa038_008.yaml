body:
  text: 太陽之精順天左旋天行一日常周三百六十五度四分度之一仍遇一度日亦一日一周而比天不及一度積三百六十五日四分日之一而與天會太陰之精亦順天左旋一日常不及天十三度有奇不及日十二度有奇積二十七月有奇而與天會積二十九日有奇而與日會
