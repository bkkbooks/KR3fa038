body:
  text: 女宿星名女宿星如箕宿形離珠相伴夾天津兩𠂢奚仲扶筐裡下有諸侯十二星日月五星之道主裁制布帛嫁娶事女宿明大年豐女工昌暗小國虛耗動搖天下婦女灾多産死變色嬪妃廢離珠移徙芒角後宮亂天津明動兵起一星亡津道不通二星亡天下陷覆星俱亡江湖水溢賊稱王𠂢敗𠂢明則年豐暗小歲歉移徙推山谷
