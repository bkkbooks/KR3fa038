body:
  text: 蒼雲抱月陰犯其陽姦邪謀逆將敗起兵月色赤暗陽胃其陰君后災凶將相災晦兩月相間陽氣交剝女后欺君將相謀叛數月重現陰道混亂天下兵起分拽土宇月色盡明陰氣妄行姦邪兵起爭國月度衆星陰氣雜敗將帥縱兵與夷交通諸星攢月陰陽不和國多火災陰謀于上諸星蝕月星在月中天下兵起將相災憂月垂芒刺君德昏亂土地衰弱白霞貫月女后崩大臣將軍災月出乍南乍北陰氣雜亂人君失御天下兵起月行或進或陰氣偏滯女后專權退將帥擅當圓不圓陰氣衰弱姦邪謀起兵作亂當缺不缺陰氣強盛將相諧女后寵盛朔日月生東方陰氣妄盛刑法濫及民怨兵起雲如杵抵月陰犯陽也女后將相凶災黑白氣臨月陰愈挺澤姦邪諧孰貴人災月始生復沒陰氣衰微天下兵起將相憂災當出不出女后偕分當入不入將帥竊柄雲氣包月天下有扳城之災月旁赤氣如人頭大戰月生瓜君有失過臣下謀叛月生足所指方有凶月黃白珥國有喜慶赤青兵災純白憂喪黑色失地月暈月暈五色國生賢嗣或任賢臣反背后妃異心將相異志散暈賊謀不成行師得勝有光我兵得勝賊自來降赤色火旱興災兵殘人死白色王侯謀立起兵作亂黑色國主憂危野有水災月暈日一重兵起四重國危
