body:
  text: 兩邑平原君欲知鄭在越下存十六黄星細區分五個離珠女上星盿瓜珠上瓠瓜生兩箇各伍瓠瓜明天津九箇弹弓形兩星入牛河中横四個奚仲天津上七個仲側扶筐星虚宿上下各一連珠状命禄危非虚上星虚危之下哭泣星哭泣雙雙下壘城天壘團圓十三星敗臼四星城下横臼西三箇離瑜明危宿三星不直舊先知危上五點號人星人畔三四杵臼明人上七烏號車府府上天鈎九黄星鈎下五鵶字造父危下四星號坟墓墓下四星號虚梁十箇天錢梁下黄墓旁兩星能盖屋身著皂衣危下宿室宿兩星上有離宫出遶室三雙有六星下頭六箇雷電形壘壁陣次十二星十二兩頭大如井陣下分明羽林軍四十五卒三為群軍西四下多難論仔細厯厯看區分三粒黄星為鐵鉞一顆真珠北落门門東八魁九個子門西一宿天綱是電旁兩點土工吏螣蛇室上二十二壁宿兩星下頭是霹靂霹靂五星横着行雲雨之次曰四方壁上天厩十圓黄鐵鎖五星羽林旁
