body:
  text: 天莭明吉暗㓙天𨵿芒角兵起津梁不通諸王明則藩臣盡礼暗則臣下專政不見社稷危兵大起天潢不見津梁不通天園曲則百穀熟直歲飢參旅直兵動曲不常王者誅殺不當芒角兵大起九洲城口星亡天下擾乱五車均明吉暗國絕移動变色兵起柱出外米貴五星守留天子巡遊
