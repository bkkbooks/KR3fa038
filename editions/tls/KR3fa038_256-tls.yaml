body:
  text: 流星乃天上譴告之使長大者事大其禍短小者其事小其禍連先大後小憂抑于國先小後大國有吉慶大而有光貴人多灾小而光盛小人謀叛蛇行屈曲陰謀暗害色赤無光憂使告變減而復光詐偽事成乆見始減大風傷物流青名天雁歲飢國憂流赤名見雁火旱與灾流白國有兵喪流黑主水灾流黃大興土木流星盡損名頭兵起赤流犯月后灾臣叛軍將灾入月有光兵起國亡流出月暈陰謀泄漏流星有声急兵作乱流光燭地百谷傷損流星共聚賊謀作乱流三投四柱營破將亡流星隍营兵敗將㓙大星流眾星隨民流君灾兵敗將亡流星赤壁所墜之方人疫流入昴畢內兵通夷作乱流入三垣流犯天台勲戚灾㓙流入角门外夷通使流犯文昌文臣有难流曲入房諫官灾危流如掃箒賊寇作乱流入参宿外兵疫死星昏而流雨水為灾流星破辟年多蝗虫二星共流乱兵争闘
