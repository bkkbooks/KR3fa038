body:
  text: 頁四八十月月蝕陰太獨傷将軍灾危人多寃獄月暈蝕掩犯眾星暈蝕犯北斗水灾國喪兵起有赦天乙百谷不成歲㐫人饑紫微天子鴻昏廢后立寵太微女后擅權谷耗牲傷天市奸邪陰謀谷耗将相㐫貫索刑罰不平人多寃獄帝座陰謀干上國主灾危左角刑濫罰貪右角兵乱起亢宿近侍陰謀變及內朝民疫将軍灾死氐宿前后妃灾氐宿後主将兵㐫房宿上水灾相㐫房下星旱灾将㐫月入房中為陰為雨不雨将相灾月出房中地震歲旱谷傷人飢蝕暈犯心中君灾心前太子㐫心後庻子㐫尾前妃后灾㐫尾後妃嬪灾㐫箕宿后妃背怨百谷不登斗宿君后不和灾及大臣建星蛟龍時現谷傷畜損牛宿津梁阻塞牛馬多死女宿賤妾凌貴女人多死虛宿國喪臣灾祭祀不潔墓坟宮殿崩毀臣敗人死危宿土工兵灾祭祀不享室宿土木妄興歲飢兵乱璧宿奸邪得志文臣多難羽林軍兵戈乱起将相灾憂奎宿兵戈乱起武庫不謹娄宿刑濫兵起郊祀不享胃宿倉廩虛耗謀殺妄及昴宿刑罰不當胡兵為㓂
