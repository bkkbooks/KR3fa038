body:
  text: 虛宿星名虛星两两射司危司禄司非两並居敗臼壘城相哭泣不妨司命合離瑜冢宰之战祭祀喪哭泣虛宿斜欹上下不正祭祀失禮司危明大主喪亡者驕佚司禄明潤爵禄公暗則奸邪竊司非明大侃㸔言使司命明盛人多死敗臼亡則人飢流離榔中天壘明大變動至移犯過邊哭泣明大國人主悲怨離瑜明大後宮奢侈微小后宮儉約
