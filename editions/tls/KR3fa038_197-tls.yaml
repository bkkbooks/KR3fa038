  text: 星宿星名星宿栁下似鈎形更有軒轅頭上明天相內平天稷寔彗妖守犯乱臣與主衣裳文銹主急兵盜賊星宿明則王道昌賢臣用暗則天子灾賢臣不用天下空虛動則兵起失色芒角女妃灾賢臣誅內平明則刑罰平暗𡨚獄滯軒轅明小吉盛大后宮爭競移徙國人流離兩角張開後族數弱
