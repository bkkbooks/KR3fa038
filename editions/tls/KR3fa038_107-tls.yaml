body:
  text: 心宿星名南方火宿號為心惟有中星色更明積卒相連心宿下四三攅聚主天兵中星天王之位近房之心主太子近尾主庻子心宿明赤君德昌天下和同暗則帝王昏弱前星不明太子不得立後星不明庻子伐位心变黑大人憂心直君失勢動搖國有憂芒角兵起人民流離積卒微小明潤國安兵間盛大兵起一行亡則兵出二星亡兵半出三星俱亡則兵盡出外尾
