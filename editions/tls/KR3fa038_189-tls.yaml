body:
  text: 鬼宿星名鬼星原作積尸煬天狗交爟天社旁天紀外厨相掩映五星守犯㓙主喪日月中道五星之道主死喪主天目明察奸謀鬼宿明大百穀登暗則百姓憂動有光欽賦急徭役重移徙人愁政急積尸明則兵起殺人大臣被誅多病死爟星明盛烽火有警芒動邊兵警急天紀不見禽獸死天社明則社稷安徽暗國祚危動搖臣謀君上大㓙外厨不見膳者咎
