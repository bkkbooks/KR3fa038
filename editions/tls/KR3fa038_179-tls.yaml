body:
  text: 参宿星名参宿七星連玉井参旗遶遶應將軍屏星軍井伐星應天厕之中天屎沉日月五星之道主邊城鉄越参宿明則臣忠子孝動移國殺忠臣邊候有警容伐主七星明天下兵精芒角王道灾失色軍敗散左足入王井甲兵大起秦地水喪山石為怪玉井外兵大起虎狼為灾芒赤耀橫射三軍動帝自將出兵中三星為夷狄胡鮮之國不微明大
