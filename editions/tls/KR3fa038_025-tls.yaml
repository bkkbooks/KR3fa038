body:
  text: 星次天社六星弧東倚社東一星名天紀柳宿八星曲頭垂似柳近上三星號為酒享宴大酺五星守星宿七星如鈎柳下生星上十七軒轅形軒轅東頭四内屏屏北三個名天相相下稷星横五靈張宿六星似軫在星旁張下只是有天廟十四之星册四方長垣少微雖向上星数欹在太微旁太尊一星直上黄翼宿二十二星大難識上五下五横着行中央六箇恰似張更有六星在何處處相連张畔附必若不能分处所更請向前看野取五個點星翼下頭欲知名字是東甌軫宿四星似張翼相近中央一點長沙子左轄右轄附兩星軍門兩黄近翼是門西四個土司空門東七烏青丘子青丘之下名器府器府之星三十二以上皆是太微宫黄道向上看取是
