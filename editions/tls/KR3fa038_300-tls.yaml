body:
  text: 雨驟水濫百姓怨恨兵起作乱秋陰常君比淫朋刑濫兵起薄雲籠日乆雨不止君惑奸嬖號令不宻薄雲籠日細雨不正君德淫昏人民怨怒所致兵灾大起盡陰夜雨乆不臣擅君權將起叛逆畫雨夜陰乆不離君德昏昧臣下謀叛三月無雲不雨作旱君寵𡡮妃僣立為后踰莭失常天雖乆旱有露滋物盜賊兵起屠戮人民雨中龍陸奸邪陰謀君上失莭不時作旱劳役不均陰謀干上雲勢漢光雪多電火大風狂鼓主雨不乆雲復於所起之方或起兩風雨止之象四方黑相如雲赤雲如火雲高慘白雪憂白雲勢斷續皆主雨歇不止則旱有雨不多日火旱生火露五谷不傷霞占天之容氣所結長尺餘丈餘十丈餘動而有力𠰥鈎鎗之貫日貫月貫三垣貫二斗貫二十八宿以所臨分野别其休咎若霞見五采是為和平之氣所散不為灾
