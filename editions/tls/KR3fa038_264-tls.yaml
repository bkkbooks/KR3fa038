body:
  text: 离宫米貴人死天下乱有兵主淂地奎宿兵草起乱武庫耗散娄宿刑濫兵起郊祀不敬天子絕嗣胃宿倉粮耗杇百谷不成昴宿臣稱王命胡兵為革中國擾乱天苑天厩祀官庖丁灾㓙觜宿奸臣謀逆將㓙色黑人死參宿外國兵乱邊人流血井宿水灾兵起人相食君王走鬼宿歲㓙人死兵起栁宿周分兵起庖宰太甚希鹽貴酒旂天下大順賜爵宗室星宿急兵水灾乆守同行謀逆天厨外厨祠官庖丁灾㓙張宿兵灾人死賞功不當軒轅后灾兵起國君頌赦翊宿天子淫佚兵灾國危軫宿兵草乱起寇敵来降玄戈胡兵大敗八轂年轂不登
