body:
  text: 角宿兩星南北正直着中有平道上天田縂是黑星兩相連别有一烏名進賢平道右畔獨淵然最上三星周鼎形角下天門左平星雙雙横于楼庫上楼庫十星屈曲明楼中五柱十五星三三相似如鼎形其中四星别名衡南門楼外兩星横亢宿四星恰似彎弓状大角一星直上明折威七子亢下横大角左右挕提星三三相似如鼎形折威下左頓頑星兩個斜安黄色精頑下二星號陽門色若頓頑直下存氐宿四星似斗側量米天乳氐上点一星世人不識稱無名一個招搖梗荷上梗荷横列三星状帝星三点河之西亢池六星近挕提氐下眾星騎官出騎官之眾二十七三三相連十欠一陣車之下騎官次騎官下三車騎位天輻兩星立陣旁将軍陣裡鎮威霜房宿四星直下主明堂鍵閉一黄斜向上鈎鈴兩個近其旁罰有三星直鍵上兩咸夹罰似房状房西一星號为日從官兩星日下出心宿三星中央色最深下頭積卒共十二三三相聚心下是
