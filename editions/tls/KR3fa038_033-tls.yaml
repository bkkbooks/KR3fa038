body:
  text: 地變難支此之謂也天占天忽開裂陽不足也國主起兵土地分拆天門忽開陰氣冲破土地分拆中國更主天起陰霾陰氣結滯君臣離心陰謀作乱天變昏黑陰氣盛也君德不明奸邪欺罔惨黄惨白風雨之兆陰謀兵變火灾憂喪忠良灾天日久陰陰氣重盛東夷起兵侵犯中國天色青碧陰冐陽也陰謀起乱兵喪為灾天赤如血陽氣太盛所現之方火焚公宇天鳴有聲天皷鳴也所鳴之方兵变疫生天作暴寒陰剥陽也國有陰謀野有兵變青氣如虹吉祥之兆時雨降賢人出黄氣如虹天賜禎祥國生賢嗣将相得人白氣如虹憂氣太甚水灾歲㐫刑濫兵起黑氣如虹陰氣冲盛水灾歲㐫黄氣遶貫二斗吉祥為兆歲豐人安國生賢嗣赤氣遶貫二斗陽氣妄現火旱灾興歲㐫兵起天雨骨陽氣消㜰兵役盛興國破启亡天雨囱名曰天傷侫人䘵功臣戮多寃獄
