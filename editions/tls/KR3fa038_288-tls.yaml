body:
  text: 生商風防敵輻重克羽風可截敵水八風占八風不作陣勢氣味不甚掀大五風间或有八風時常有之乾風怒怒不疾不巽風平范長輕不兌風純純襲不乱坎風尖削性援成旋離風明天和若雨若絻艮風剛大織我物上沖震風沖大梁猶而襲起坤風長大色倉遍行比散八風只以先天方位為主算乾方來乾方國政張明來兌方選用𡡮姫來离方火焚宫殿來震方國家封王來巽方行政淂中來坎方國主頒赦來艮方國求吳士來坤方兵求粮餉兌方來乾方𡡮姫淂寵來兌方女子多死來离方宫中火灾來震方賤妾布媚來巽方𡡮姫奪后來坎方內侍陰謀來艮方宮中口舌來坤方外夷重譯离風來乾方來震方歲旱火灾來离方火焚宫寝來兌方多進宮人
