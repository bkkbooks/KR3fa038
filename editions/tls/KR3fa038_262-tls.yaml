body:
  text: 庫樓兵起作乱財貨虛耗攝提聖人受制大風不常損壞百物房宿將相灾危馬多死心宿君上憂危皇子灾㓙旱灾招搖國有㓙喪兵水為灾胡兵大敗陽门邊兵作乱詐死入內尾宿歲飢后與妃嬪俱灾斗宿兵起臣子弒君父乆守國君絕嗣大臣灾箕宿歲㓙米貴后宮譜毀天江天淵魚鱉龜星大水白衣會兵起狗國中國人通夷作乱牛宿吳越有自王者牛多疫津梁有阻天弁君改服制囚徒乱起建星百物損傷徭役重大女宿賤妾凌貴女人作乱二𠂢谷菓不成魚藍貴虛宿國有㓙喪兵起臣灾危宿土工妄與祭祀不敬室宿改作宮殿兵灾可利坟墓天下人民死亡過半
