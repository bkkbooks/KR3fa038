body:
  text: 两咸搖動天子淫泆無度尾宿太子灾乆守后族逆𡡮妃賣權至旱箕宿轂貴人飢后宮多口舌牛宿大水灾山澤猛常傷人建宿歲飢人餒女宿大水灾人多凍死虛宿昭穆失序人多飢疾瓠𠂢𠂢菓不熟魚貴离宫東有喜西米貴南旱北喪憂危宿天子大興宮室奎宿北夷懷服坟墓宗室不敬有哭泣𨐧宿大臣有灾娄宿牛馬多死米貴人飢有赦胃宿人多病死乆守五谷不寔昴宿米貴人飢君厳刑罰觜宿人飢久守將兵在道五谷損傷参宿歲大疫井宿王法多獄訟守七十日天下更變有赦鬼宿國有兵喪乆守天下半死
