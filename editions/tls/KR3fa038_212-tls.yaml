body:
  text: 星辰羅列於天畫夜旋繞一周故其昏旦各有其星現於中位即其星可以知天之轉動也立春雨水昏参中旦尾中驚蟄春分昏弧中旦遠中清明轂雨昏星中旦牛中立夏小滿昏翼中旦女中芒種夏至昏亢中旦危中小暑大暑昏火中旦奎中立秋處暑昏建中旦畢中白露秋分昏牛中單觜中寒露霜降昏虛中但栁中立冬小雪昏危中旦星中大雪冬至昏壁中旦軫中小寒大寒昏娄中旦氐中中者南方正午之位陽門之其星至此分外光明而無一點掩滯之患故考星者必於此地而考之
