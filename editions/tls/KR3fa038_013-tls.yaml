body:
  text: 柄象華盖形盖上連連九個星名曰傳舍如連丁垣外左右各六珠右是内街左天厨階前八星名八轂厨下五星天棓宿天床六星左樞右内厨二星右厨對文昌斗上半月形稀疏分明六個星文昌之下三師黄天槍尺向三公明天牢六星太尊邊太陽之首四勢前一個宰相太陽側更有三公向西偏杓下玄戈一星圓天理四星斗裡暗輔星近着暗陽淡北斗之宿七星明第一主帝名樞星第二第三璇璣是第四名權第五衡開陽搖光六七名紫薇之次是諸星天市垣下垣一宫名天市兩扇垣墻二十二當門六角黑市樓門左兩黄是車肆兩箇宗正四宗人宗星一雙亦依次帛度兩星屠肆前候星還在帝座邊帝座一星常光明四個微茫宦者星以次兩星名列肆斗斛帝前依其次斗是五星斛是四垣北九個貫索星索口横着七公成天紀恰似七公形数着分明多兩星紀北三星名天床此坐還依織女旁三垣之象無相侵二十八宿隨其陰水火木土並金星以次列有五行云二十八宿歌
