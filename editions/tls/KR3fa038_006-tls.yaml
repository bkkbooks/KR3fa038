body:
  text: 周禮保章氏掌天星以星土胡九州之地所封封域皆有分星以觀妖祥議者謂周在中土而星之想在南魯在東齊在東而在而齊在東而星應之在北似無可者諸傳記所載十三國变祥之應又皆騐可徵十二分野地名太简畧角亢氏鄭分兖州今河南開封汝寧房心宋分豫州今江南徐州尾箕燕分幽州今北直順天保定河間永平盛京朝鮮斗牛女吳分揚州今江南江西浙江福建廣東廣西之梧州虛危齊分青州今山東濟南東昌青州登州萊州室壁衛分并州今河南衛輝彰德懷慶業直之大明奎娄魯分徐州今山東兖州胃昴畢趙分冀州今北直之真定順德廣平山西之大同觜参晋分益州今山西太原平陽達沁浴澤四川井鬼秦分雍州今陝西四川雲南貴州梆星張周分三河今河南洛陽南陽湖廣之鄖陽襄之均州光化轂城泰陽德之隨州應山冀軫楚分荊州今湖廣廣西廣東之亷州四川之夔州貴州之銅仁黎平
