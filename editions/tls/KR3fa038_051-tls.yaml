body:
  text: 牛中津渠阻塞牛多疫死女中人相疾怨賤凌貴虛中危中室中天子将兵庻民絕粮壁中君不用賢輕侮文章奎中國女不安娄中郊祀不享小臣不忠胃中郊祀有咎昴中兵灾大起觜中邊兵灾臣子伏誅参中大臣相諧起兵謀弒井中大旱生灾人派千里鬼中貴人有憂天下不安栁中大臣有憂星中天子不安其宮張中王者失礼翊中大出出譛軫中貴人死亡月象月者太陰之精其休清明其形圓潔借日之光始得其明日所不照斯謂之魄日月相望人居其中盡見其光故輝色圓滿也二弦之際日照其側人見一邊故色半明而半魄也晦朔之時日照其裏人在其裡故不見其明而昏黑也對日之衝其大如日日光不照謂之闇虛逢月則月蝕值星則星亡以之配日女后之象也以之輔日大臣将軍之象也月度
