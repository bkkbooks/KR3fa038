body:
  text: 時發聲於出聲之先收聲已收之後為非時也非時雷擊為妄擊君終臣叛無雲而雷為寡助兵乱國危正月鳴雷為震鬼門人多灾疫雷震連日為長擊政殘民怨秋月暴雷為天收百谷虛耗冬月鳴雷為陽陰陽反逆雷震而雪陰盛陽微將起殺伐弒奪雷焚宮殿陵寢國有謀逆血食不乆雷擊宮聽為天怒政事不公雷擊宗廟為天最血食不乆春三月一日四月雷歲時大熟夏甲子庚寅辛已日雷生蝗虫秋甲子雷歲將大㓙冬庚成辛亥日雷正月米貴九月雷谷貴雷起乾方人多疫死兌方兵水為灾离方火旱為灾震方棺木價貴巽方螟生傷禾坎方水灾歲㓙艮方米貴人死坤方蝗生米貴
