body:
  text: 尾宿九星如鈎蒼龍尾下頭五點號亀星尾上天江四横是尾東一星名傳説傳説東畔一魚子尾西一室是神宫所以列在后妃中箕宿四星形状似簸箕箕下三星名木杵箕前一點是糠粃斗宿六星其状似北斗魁上建星三相對天弁建上三三九斗下圓安十四星雖然名鼈貫索形天雞建背双点星天籥柄前八黄精狗國四方鷄下生天渊十星鼈東邊更有兩狗斗魁前農家丈人斗下眠天渊十黄狗色玄牛宿六星近在河岸頭牛下九星是天田田下三三九坎連牛上直建三河鼓鼓上三星號織女左旗右旗各九星河鼓兩旁右邊明更有四黄名天桴河鼓直下如連珠羅堰三烏牛東居漸台四星似口形輦道東足連五丁輦道漸台在河許欲得見時近織女女宿四星如箕主嫁娶十二諸國在下陳先從越國向東論東西兩周次二秦雍州南下雙鴈门代國向西一晋申韓魏各一晋北輪楚國一星魏西屯楚城南畔獨燕軍燕西一郡是齊隣齊北
