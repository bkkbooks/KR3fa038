  text: 觜宿名星觜宿三星兆旅軍座旗直指透天門眼前小醜休司怪彗孛加之帝出征三軍之候主收斂萬物觜宿明則軍儲盈實將軍淂势動搖失色大兵乱起明盛芒角盜賊羣行暗則出兵主敗座旅明則尊早有序不見上下無常司怪不見陰陽不和妖怪百出曆官失战並主戰㓙
