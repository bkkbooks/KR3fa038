body:
  text: 井宿星名以下南方七宿井邊四瀆銊水府南河北河積水老人丈人雞子孫諸侯軍市搡孤矢日月五星之道天之應候主水衡法令井宿明正端列王者用法平不正國法乱四瀆明大河决暗則流散水府移近北河大水滔天南河主南界蛮夷搖動南兵起北河主北方夷狄動搖北兵起積水不明主大水灾老人明大多老人有壽不見人夭兵起犬人不見臣下之情不通子星明國君好子森森孫星明宗枝繁衍弧矢移徙变色多賊盜胡兵起芒角張滿兵乱軍市市中星多粮足稀少粮歉变色軍乏其粮諸侯明則國用賢臣則忠臣不用芒角諸藩有变
