body:
  text: 華盖正則吉邪則內侍謀叛傳舍外使来王暗四歲犯邊二樞明新君即位有政民搖動囊起宮掖天柱明則稱战暗則司曆有失天倍不見兵起芒角兵大乱內階明吉傾動不見內府有变天厨明上膳得中暗厨膳不給失色芒角內膳進毒天床明吉傾動人君不安天床即天卦庻子心後星俱小明庻子安二星芒角庻子不安分二星暗小庻子微弱心復星者即心宿近尾之星也占与庻子同八轂一稻二黍三田四大小麥五六大小豆七粟八蔴明八谷收星亡人餓莩一星不見一谷不收陰陽德明則陰陽和人君賬恤其民
