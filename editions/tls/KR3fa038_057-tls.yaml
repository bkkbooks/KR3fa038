body:
  text: 五重后灾六重君灾七重天下易主八重世乱九重亡國月重白暈王謀立兵主久戰月暈赤白将相離心殘賊誅戮入斗大水入城兵起有赦貫索天下叛逆有雲横貫起兵者勝重光扵下兵起華乱将帥灾危有氣横冲㓂勢驍勇冲營殺将連環白虹出外后妃陰謀立見弒奪外有珥璚主六十日兵起外賊乱有現垂下兵戰凶灾外有背珥陰謀弒奪終不能賊月有背璚臣下縱欲互相殘賊月終歲不暈天下太平偃武修文一月月暈五次君上無道将失土宇月蝕月蝕者乃陽氣大盛扵九道交行之時冲掩月光故張横渠曰君子用志月蝕青色五谷貴赤色火旱白色兵喪黑色水憂黄色王侯謀立月盡蝕女后难将軍灾五谷貴大人憂貴人死不盡破軍殺将國主憂灾月蝕從上君失其道國家有難從下君令不信相臣灾危從旁法度不密将軍有灾兩間兵草乱起大戰彗射入将相灾危有兵起射方擊之大勝緩三日雨主百事盡散
