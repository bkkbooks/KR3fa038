body:
  text: 元宿星名元宿四星似彎弓大角相遠兩攝提元下有星還照映頓頑陽門與折減元宿明大輔臣强納終人無疚疫動搖人多疾病暗則國政弱大角明潤天下和平動移變色天子憂散乱王者離散折威盛大兵起芒角兵大乱左右攝提明小天下安寧盛大芒角三公恣慾人主怒頓頑明則獄訟理暗則刑罰濫陽門明則四夷賓服則蠻夷犯邊氐
