body:
  text: 日象日者太陽之精內黑而外光故能照耀萬物一日而繞地一周每日不及天行一度積三百六十五日有奇周天而與天會行黃道東陸為春南陸為夏西陸為秋北陸為冬運於四時以成寒暑濕涼之候也極南至於牽牛則為冬至極北至於東井則為夏至春分後其行遲秋分後其行快從辰交度知有薄蝕之患若夫春日紅潤夏日蒸炎秋日煔烈冬日溫平皆吉兆也日者人君之象君德盛行于天則則日華常五彩以兆禎祥又曰日有變不在分野則在君上四時日行度數立春日在危大弱去極一百六度雨水日在室八度弱去極一百一度驚蟄日在壁八度強去極九十二度春分日在奎四十度強去極八十九度清明日在胃一度強去極八十三度轂雨日在昴二度強去極七十九度立夏日在畢七度去極七十七度小滿日在參四度去極七十三度芒種日在井半度強去極六十九度夏至日在鬼十五度去極六十七度小暑日在柳三度弱去極六十一度強大暑日在星四度強去極七十度立秋日在張十三度弱去極七十三處暑日在翊九度半去極七十八強
