body:
  text: 天體吾觀上天其體周圍渾淪其性健行不息其誠運轉有常其理真一不二其氣遊衍磅礴其徑有三十五萬七千里每方得八萬九千二百五十里自下距上十八萬里此古今星書之言良弗誣也俗云天無定體二十八宿以為之體何足以語蒼蒼蓋軫之形哉天度天形周匝大槩言之約有三百六十五度四分度之一細分言之每度有一千九百三十里七十一步二尺四分後以日照陽城勾股法算之南極入地七十二度隱而不見北極出地七十二度現而不隱可以知其度數而不舛也天象輕清上浮蒼茫成色河漢界分于其中星宿昭懸於其上是天之本象也若夫雨露下墜霜雪肅寒是則陽氣而用陰也雲氣飛騰風煙蒸欎是則氣陰而用陽也天不滿於西北則陰盛陽微其氣寒亦且天低而地厚日氣易及乃生和氣以成萬
  hash: sha256:61f42598f9b3a5642d6ba05c4339760637665d5f279e956a1010ec5690966a49
