body:
  text: 離宫水灾天子欲改王圖墳墓奸臣謀上奎宿水灾大臣入獄雷雨雨水大作婁宿水灾萬物不成行政等刻胃宿米貴水灾井宿有自王者尋破不成鬼宿貴臣執政伏誅水灾栁宿地震同地旱灾星宿水灾貴人犯罪張宿大兵起人多死婦女灾翊宿歲歉人飢離亡軫宿水灾五谷傷病起
