body:
  text: 離宫水災天子欲改王圖墳墓姦臣謀上奎宿水災大臣入獄雷雨雨水大作婁宿水災萬物不成行政等刻胃宿米貴水災井宿有自王者尋破不成鬼宿貴臣執政伏誅水災栁宿地震同地旱災星宿水災貴人犯罪張宿大兵起人多死婦女災翊宿歲歉人飢離亡軫宿水災五谷傷病起
