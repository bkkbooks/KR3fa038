body:
  text: 襲月后宮廢大臣逐畫漏明刑罰濫大風起太白蝕月臣叛兵起將凶太白經天人民飢饉流離兵災與月並明主大戰扳城月犯金星天下民散金入太微垣九鄉謀叛金守角上天田水旱為災五谷不登守左右攝提兵起更改國命犯守左角兵不可戰金入氐宿兵主災疫金守氐宿兵戈動將軍封金守房宿陪臣脅君久守人飢金守心宿山崩兵起移近心三寸有戟釗上殿金守兩咸兵起金守月星人主憂災金守尾星國失政人民不安金守箕星旱風怒起口舌橫議金守斗宿執政為逆有兵守褐大難平金守牛宿地泄氣大兵動
