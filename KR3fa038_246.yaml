body:
  text: 昴宿旱災有赦兵起邊寒大動天苑牲畜多盜死畢宿兵寇邊産大動觜宿百物不生天下大亂魏地兵起參宿四方兵起有赦久守天下更改秦地大凶百萬貴大旱豬樣羊多死井宿米貴大臣相戮久守宮中災鬼宿人多病亡大臣誅勾已出喪兵起有赦栁宿大臣不慎天子命守一日闕失地旱人飢星宿春夏守為太昜格大旱久守人多死水災兵起張宿國亂兵起米貴軫宿有兵將軍憂芒角天下亂軫中人民盡為軍役軒轅皇后失勢火星會月國君亡月犯火星臣民飢叛水戰將亡
