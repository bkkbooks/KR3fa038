body:
  text: 房宿天旱地震乆守奸臣謀立兵灾心宿聖君出世黃光有慶錫之事芒角有赦乆守水旱不吉尾宿廢出正官盜賊害人箕宿水灾人飢兵赦斗宿有不用兵而升君位者牛宿賊臣害主天雞人飢相食虛宿風雨不時多風大旱危宿大興土木坟墓土工與旱灾离宫與造宮室將軍益對壁宿貴人用文章與君延壽天下寧奎宿逆謀久守貴女執政娄宿五谷傷損奸臣謀叛昴星后失勢久守大將出征西南流血参星大臣出使奸臣謀逆栁宿君臣和同天下大天厕人飢多病井宿旱灾乆守勾已有数笛東角不去天下無主
