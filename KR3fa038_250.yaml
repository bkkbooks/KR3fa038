body:
  text: 房宿天旱地震久守姦臣謀立兵災心宿聖君出世黃光有慶錫之事芒角有赦久守水旱不吉尾宿廢出正官盜賊害人箕宿水災人飢兵赦斗宿有不用兵而升君位者牛宿賊臣害主天雞人飢相食虛宿風雨不時多風大旱危宿大興土木墳墓土工與旱災離宫與造宮室將軍益對壁宿貴人用文章與君延壽天下寧奎宿逆謀久守貴女執政婁宿五谷傷損姦臣謀叛昴星后失勢久守大將出征西南流血參星大臣出使姦臣謀逆栁宿君臣和同天下大天厠人飢多病井宿旱災久守勾已有數笛東角不去天下無主
