body:
  text: 斗天雞羽林天鋼八魁翌積薪皆火旱兵灾牛宿老少反逆牛貴十倍歲飢天江水灾久守有自立王者墳墓建星歲飢朱貴人死狗星外夷乱動女宿國有喪患天下婦女多產死奚仲附路兩河積水薪皆主水旱兵灾織女布帛貴兵起天津天國火旱歲凶哭泣人多死亡危宿宮多承史离宫將軍亡勾已臣謀上大旱乆守殺奪起天錢賊寇擄掠車府兵草動壁宿歲旱米貴以邪害正兵起奎宿國人相諧夫子不親乆守臣下謀叛水灾米貴人病疫死產死娄宿天下兵起乆守人多疾病大臣乱政更两兵起山澤之间胃宿人疾疫米貴乆守天下倉空兵起血流千里
