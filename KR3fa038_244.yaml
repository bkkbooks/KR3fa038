body:
  text: 斗天雞羽林天鋼八魁翌積薪皆火旱兵災牛宿老少反逆牛貴十倍歲飢天江水災久守有自立王者墳墓建星歲飢朱貴人死狗星外夷亂動女宿國有喪患天下婦女多産死奚仲附路兩河積水薪皆主水旱兵災織女布帛貴兵起天津天國火旱歲凶哭泣人多死亡危宿宮多承史離宫將軍亡勾已臣謀上大旱久守殺奪起天錢賊寇虜掠車府兵草動壁宿歲旱米貴以邪害正兵起奎宿國人相諧夫子不親久守臣下謀叛水災米貴人病疫死産死婁宿天下兵起久守人多疾病大臣亂政更兩兵起山澤之間胃宿人疾疫米貴久守天下倉空兵起血流千里
