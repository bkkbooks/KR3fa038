body:
  text: 澤格星出北斗旁色如指火如星似雲非雲光照似彗紅光會北斗主兵息敵國滅枉夫星類星蒼如有毛長轂大或如著天見則謀兵作亂國皇星大而赤如煙火去地三犬內外兵起擾亂天下焰明星大兩白光芒不行光乍上乍下成如亂伯者與霸業王維星星赤黃星星國有兵喪臣子伏誅披頭星白氣宇心上有赦民百物消耗亂兵作害帝劍星白氣寧心敘舊兵起作亂宜先進戰銀鎗星白氣直貫于心兵起西方擾害天下張弓星氣始如弓桀上射兵起民災緩終有均拖練星白氣𡸁如練兵起國主凶喪災及客神了星焰上出末兩了大兵起主將乖疑擔旗星焰上起如擔旗邊兵作亂血戰無休頭星陰上頭起下按兵起作亂人死如山天衡星如人赤青姦邪謀叛起兵作亂天星光上出如兩物天下兵起殺戮人民天燭星色變白燭上出盜兵起亂不久尋滅天星出東方類彗末鋭白光出則主爭奪兵起其國王破軍扳城王縫星彗為之表如毛大主兵喪誅大臣地維星光出四隅赤去地三文如月見則王者有德昌無德亡
