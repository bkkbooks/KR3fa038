  text: 斗宿星名以下北方七宿斗星原與建星連天䈁圓圈鱉宿邊天并天鵝名狗國犬人一點守天淵日月五星之道丞相太宰之位主薦賢主兵樓斗宿明䘵公天下平暗大臣失位芒動兵起移徙大臣逐建星動搖人民勞苦天开明吉暗凶天䈁明吉暗則開菕無禁
