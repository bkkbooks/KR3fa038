body:
  text: 土星名鎮星二十八年一周天運乎四維主乎天紀絕于軫角動而贏侯王不寧動而縮有兵起于所居之亏主信主息德方而靜信失思妄罰見土星乆而不去黃光潤戰則淂地國享厚福王者失嗣去而不守逆行不来其淫奢上失其所故鎮星厭而避之失次下二三宿曰縮后戚憂灾主有天崩地裂之患失次上二三宿曰嬴主大水灾㓙土變失行城國變后失礼度土變失色扳城之患后宮灾失序光明黃潤天子信令不行失色縮小國有陰謀之變昏暗不明君不信令土犯北斗王者失國土守斗西歲飢土犯太微垣革命與月合宿國飢月蝕土星民流千里土守犯月女主憂饑饉為變王者灾守右角兵出戰利氐宿太子立
