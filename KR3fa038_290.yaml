body:
  text: 來巽方火旱為災來坎方姦邪陰謀來艮方姬妾僣強來坤方有犯太后震風來乾方太子即位來兌方採選宮女來離方天下文明來震方新君布政來巽方君選后妃來坎方太子嬖幸來艮方王道大與來坤方天下和平巽風來乾方君后協和來兌方蝗生谷傷來離方火焚內宮來震方蠻夷猾夏來巽方后妃嫉妒來坎方后嬖姦邪來艮方選用文士來坤方不敬宗祀坎風來乾方民求賑濟來兌方姦邪成風來離方民災兵起來震方陰謀立嫡來巽方百谷豐登來坎方陰謀幹上來艮方兵起作亂來坤方盜賊兵起民風來乾方外夷入貢來兌方外國求婚來離方旱災千里來震方攘奪立嫡來巽方百谷不登來坎方水災相仍來艮方歲旱米貴來坤方不收坤風來乾方女后專權來兌方君嬖賊妾來離方水旱生災來震方后愛太子
