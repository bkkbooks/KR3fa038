body:
  text: 来巽方火旱為灾来坎方奸邪陰謀来艮方姬妾僣强来坤方有犯太后震風来乾方太子即位来兌方採選宮女来离方天下文明来震方新君布政来巽方君選后妃来坎方太子嬖倖来艮方王道大與来坤方天下和平巽風来乾方君后恊和来兌方蝗生谷傷来离方火焚內宮来震方蛮夷猾夏来巽方后妃嫉妒来坎方后嬖奸邪来艮方選用文士来坤方不敬宗祀坎風来乾方民求賑濟来兌方奸邪成風来离方民灾兵起来震方陰謀立嫡来巽方百谷豊登来坎方陰謀幹上来艮方兵起作乱来坤方盜賊兵起民風来乾方外夷入貢来兌方外國求婚来离方旱灾千里来震方攘奪立嫡来巽方百谷不登来坎方水灾相仍来艮方歲旱米貴来坤方不收坤風来乾方女后專權来兌方君嬖賊妾来离方水旱生灾来震方后愛太子
  hash: sha256:67fafa04e93fef5f3570255600f13115d7ebfec97f5526911db4a31ee46fd6b6
