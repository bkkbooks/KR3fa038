body:
  text: 參腳間旗下直建九遊連遊下十三烏天園九遊天園參腳邊觜宿三星相近作參蘂觜上座旗直指天尊卑之位九相連司怪曲立座旗邊四烏大近井越前參宿總有七星觜相侵兩肩雙足三為心伐有三星足裡深玉井四星右足陰屏星兩扇井南襟軍井四星屏上吟左足下四天廁臨廁下一物天屎沉井宿八星橫列河中靜一星名越井邊安兩河各三南北位天鐏三星井上頭鐏上橫列五諸侯侯上北河西積水欲覓積薪東畔是越下四星名水府水位東邊四星是四瀆橫列南河哀南河下頭是軍市軍市團圓十三星中有一個野雞精孫子丈人市下列各立兩星從東説闕丘兩星南河東丘下一狼光蓬茸左畔九個彎弧弓一矢直射頑狼胸有個老人南極中春秋出入壽無窮鬼宿四星册方似木匱中央白者積尸氣鬼上四星是爟位天狗七星鬼下是外厨六間柳
