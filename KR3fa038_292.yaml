body:
  text: 來巽方蟲生歲凶來坎方后宮陰謀來艮方宮中內亂來坤方玉帛萬田雲占地氣升而成雲雲本黑體緑受日光以成五采千欲萬狀變化莫測喜慶雲青雲潤澤蔽逵于日國有賢才用文有大喜世道昌明賢臣輔政天子雲紫氣如華蓋或成龍虎馬狀有真命天子所居所止賢臣雲四方常有大雲五采明潤俱備或成禽獸山良將雲花狀有賢良大臣宜急抬致以作輔襄大雲如金銀色或成虎豹猛獸主兵略智能良將雲生黃潤遠日上下或成龍鳳山花怪石國生賢嗣化外歸順有兵戰必勝雲生王采郁郁紛紛貴索輪回卷大喜天下太平庶民和順雲色如鵠尾𡸁陰兵亂大戰人多死亡雲氣黃黑畫花焰地大臣怨旱灾兵火灾雲如蛟龍將軍失魂散魄在軍士憂雲色黃不散小人當權久執閣柄
